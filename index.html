<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShipFlow – Quản lý dòng tiền Shopee Food</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap');</style>
  <style>
    :root {
      --orange: #FF6B2B;
      --orange-dim: #FF6B2B22;
      --green: #00E5A0;
      --green-dim: #00E5A015;
      --red: #FF4D6A;
      --red-dim: #FF4D6A15;
      --blue: #4D9EFF;
      --blue-dim: #4D9EFF15;
      --yellow: #FFD166;
      --yellow-dim: #FFD16615;
      --purple: #A78BFA;
      --purple-dim: #A78BFA15;
      --bg: #0D0F14;
      --surface: #161922;
      --surface2: #1E2330;
      --border: #2A3040;
      --text: #E8ECF4;
      --muted: #6B7A99;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }
    h1, h2, h3, .font-display { font-family: 'Nunito', sans-serif; }
    .mono { font-family: 'Nunito', sans-serif; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #3A4560; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.orange::before { background: var(--orange); }
    .stat-card.green::before { background: var(--green); }
    .stat-card.blue::before { background: var(--blue); }
    .stat-card.yellow::before { background: var(--yellow); }
    .stat-card.red::before { background: var(--red); }
    .stat-card.purple::before { background: var(--purple); }

    .tab-btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      background: transparent;
      color: var(--muted);
    }
    .tab-btn.active {
      background: var(--orange);
      color: white;
    }
    .tab-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }

    input:not([type=number]):not([type=checkbox]):not([type=radio]):not([type=file]):not([type=range]):not(.no-pad-left) {
      padding-left: 14px !important;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 11px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      width: 100%;
      height: 44px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    textarea { height: auto; min-height: 44px; }
    input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }
    .money-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 11px 14px; font-family: 'Nunito', sans-serif; font-size: 14px; width: 100%; height: 44px; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
    .money-input:focus { border-color: var(--orange); }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    input:focus, select:focus { border-color: var(--orange); }
    select option { background: var(--surface2); }
    label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; display: block; }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
    }
    .btn-primary { background: var(--orange); color: white; }
    .btn-primary:hover { background: #e55a1f; transform: translateY(-1px); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid #FF4D6A44; }
    .btn-danger:hover { background: var(--red); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
    }
    .badge-orange { background: var(--orange-dim); color: var(--orange); }
    .badge-green { background: var(--green-dim); color: var(--green); }
    .badge-red { background: var(--red-dim); color: var(--red); }
    .badge-blue { background: var(--blue-dim); color: var(--blue); }
    .badge-yellow { background: var(--yellow-dim); color: var(--yellow); }

    table { width: 100%; border-collapse: collapse; }
    th { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #1E2330; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .neu { color: var(--muted); }

    .section-title {
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    /* ── PC Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%; max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 28px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-track { background: transparent; }
    .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .order-sub-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .chip {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0 20px;
      height: 44px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }
    .chip.active { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
    .chip:hover:not(.active) { border-color: #3A4560; color: var(--text); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,106,0); border-color: #FF4D6A55; }
      50% { box-shadow: 0 0 0 6px rgba(255,77,106,0.12); border-color: #FF4D6Aaa; }
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--muted);
      transition: all 0.15s;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }
    .nav-item.active { background: var(--orange-dim); color: var(--orange); }
    .nav-item:hover:not(.active) { background: var(--surface2); color: var(--text); }

    .number-big {
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 500;
    }

    /* ════════════════════════════════════════════
       MOBILE STYLES  (≤ 768px)
    ════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .mobile-header {
        display: flex !important;
        position: fixed; top: 0; left: 0; right: 0; z-index: 50;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 16px;
        height: 56px;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1px;
      }
      .mobile-header-brand { display: flex; align-items: center; gap: 8px; }
      .mobile-header-brand .brand-name { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 18px; color: var(--orange); letter-spacing: -0.02em; }
      .mobile-header-meta { display: flex; align-items: center; gap: 10px; font-size: 11px; }
      .mobile-header-meta .user-label { color: var(--blue); font-weight: 600; }
      .mobile-header-meta .save-status { color: var(--green); font-weight: 600; }
      .mobile-header-meta .save-status.saving { color: var(--yellow); }

      aside.pc-sidebar { display: none !important; }

      .mobile-bottom-nav {
        display: flex !important;
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
        background: var(--surface);
        border-top: 1px solid var(--border);
        height: 60px;
        align-items: center;
        padding: 0 4px;
      }
      .mobile-bottom-nav .nav-tab {
        flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
        cursor: pointer; padding: 6px 4px; border: none; background: transparent; color: var(--muted);
        font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 600; border-radius: 10px;
        transition: all 0.15s; height: 52px;
      }
      .mobile-bottom-nav .nav-tab.active { color: var(--orange); }
      .mobile-bottom-nav .nav-tab svg { display: block; }
      .mobile-bottom-nav .nav-fab-slot { flex: 1; display: flex; align-items: center; justify-content: center; }
      .mobile-fab {
        width: 52px; height: 52px; border-radius: 50%; background: var(--orange); border: none;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        box-shadow: 0 4px 20px rgba(255,107,43,0.45); transition: all 0.18s; color: white;
        font-size: 24px; font-weight: 300; line-height: 1; position: relative; top: -8px;
      }
      .mobile-fab:active { transform: scale(0.93); }

      .pc-main { padding: 72px 14px 78px !important; max-width: 100% !important; margin: 0 !important; }
      .wallet-grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
      .income-grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
      .stat-card { padding: 14px 14px; }
      .number-big { font-size: 17px !important; }

      .history-table-wrap { display: none !important; }
      .history-cards-wrap { display: block !important; }

      .m-order-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; margin-bottom: 10px; }
      .m-order-card-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
      .m-order-card-row:last-child { margin-bottom: 0; }
      .m-transfer-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; margin-bottom: 10px; }
      .m-tip-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
      .m-cash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }

      .modal-overlay { align-items: flex-end !important; padding: 0 !important; }
      .modal { border-radius: 20px 20px 0 0 !important; max-width: 100% !important; width: 100% !important; max-height: 92vh !important; padding: 20px 18px 32px !important; animation: slideUp 0.3s cubic-bezier(0.34,1.36,0.64,1) !important; }
      @keyframes slideUp { from { transform: translateY(100%); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
      .modal::before { content: ''; display: block; width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }

      .type-chip-row { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
      .type-chip-row .chip { height: 40px !important; font-size: 12px !important; padding: 0 8px !important; width: 100% !important; }
      .chart-header { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
      .period-tabs { overflow-x: auto; white-space: nowrap; display: flex; gap: 4px; padding-bottom: 4px; }
      .period-tabs::-webkit-scrollbar { display: none; }

      .action-sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; }
      .action-sheet { width: 100%; background: var(--surface); border-radius: 24px 24px 0 0; padding: 8px 16px 36px; animation: slideUp 0.28s cubic-bezier(0.34,1.36,0.64,1); }
      .action-sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
      .action-sheet-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; text-align: center; }
      .action-item { display: flex; align-items: center; gap: 14px; padding: 14px 12px; border-radius: 12px; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
      .action-item:active { background: var(--surface2); }
      .action-item .action-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
      .action-item .action-desc { font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 2px; }
      .action-sheet-divider { height: 1px; background: var(--border); margin: 6px 0; }
      .action-item-cancel { display: flex; align-items: center; justify-content: center; padding: 13px; border-radius: 12px; cursor: pointer; border: none; background: var(--surface2); width: 100%; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: var(--muted); margin-top: 8px; -webkit-tap-highlight-color: transparent; }

      .tab-btn { padding: 7px 12px; font-size: 12px; }
      .history-tabs { overflow-x: auto; white-space: nowrap; display: flex; gap: 4px; padding-bottom: 4px; }
      .history-tabs::-webkit-scrollbar { display: none; }
      .history-empty td { padding: 20px !important; }
      .dash-title { font-size: 18px !important; }
      .dash-sub { font-size: 12px !important; }
    }
    .mobile-header { display: none; }
    .mobile-bottom-nav { display: none; }
    .history-cards-wrap { display: none; }
    .action-sheet-overlay { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, LineChart, Line, CartesianGrid } = Recharts;

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = (n) => {
  const abs = Math.abs(n);
  const s = abs >= 1000 ? (abs/1000).toFixed(abs%1000===0?0:1)+'k' : abs.toString();
  return (n < 0 ? '-' : '') + s;
};
const fmtFull = (n) => new Intl.NumberFormat('vi-VN').format(n) + 'đ';
const today = () => new Date().toISOString().split('T')[0];
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);

const INITIAL = {
  wallets: { app: 0, momo: 0, mb: 0, cash: 0 },
  orders: [], transfers: [], tipApp: [], cashTx: [],
};

// ── API ───────────────────────────────────────────────────────────────────────
const api = {
  async loadData(userId) {
    const r = await fetch(`/api/data?userId=${encodeURIComponent(userId)}`);
    if (!r.ok) throw new Error('Không tải được dữ liệu');
    return r.json();
  },
  async saveWallets(userId, wallets) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'saveWallets',data:{wallets}}) });
  },
  async addOrder(userId, order) {
    const r = await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'addOrder',data:order}) });
    return (await r.json())._id;
  },
  async updateOrder(userId, order) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'updateOrder',data:order}) });
  },
  async deleteOrder(userId, orderId) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'deleteOrder',data:{_id:orderId}}) });
  },
  async addTransfer(userId, transfer) {
    const r = await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'addTransfer',data:transfer}) });
    return (await r.json())._id;
  },
  async updateTransfer(userId, transfer) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'updateTransfer',data:transfer}) });
  },
  async deleteTransfer(userId, transferId) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'deleteTransfer',data:{_id:transferId}}) });
  },
  async addTip(userId, tip) {
    const r = await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'addTip',data:tip}) });
    return (await r.json())._id;
  },
  async updateTip(userId, tip) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'updateTip',data:tip}) });
  },
  async deleteTip(userId, tipId) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'deleteTip',data:{_id:tipId}}) });
  },
  async addCash(userId, tx) {
    const r = await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'addCash',data:tx}) });
    return (await r.json())._id;
  },
  async updateCash(userId, tx) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'updateCash',data:tx}) });
  },
  async deleteCash(userId, txId) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'deleteCash',data:{_id:txId}}) });
  },
  async saveAll(userId, data) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'saveAll',data}) });
  },
  async auth(username, action) {
    const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,action}) });
    return { ok:r.ok, data:await r.json() };
  },
};

const useIsMobile = () => {
  const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener('resize', handler); return () => window.removeEventListener('resize', handler);
  }, []);
  return isMobile;
};

const Icon = ({ name, size=16 }) => {
  const icons = {
    dashboard: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
    order: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>,
    transfer: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>,
    chart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>,

};

const MoneyInput = ({ value, onChange, placeholder, style, className }) => {
  const [display, setDisplay] = React.useState(value ? Number(value).toLocaleString('vi-VN') : '');
  React.useEffect(() => {
    if (!value && value !== 0) { setDisplay(''); return; }
    const num = Number(value);
    if (!isNaN(num)) setDisplay(num === 0 ? '' : num.toLocaleString('vi-VN'));
  }, [value]);
  const handleChange = (e) => {
    const raw = e.target.value.replace(/\./g, '').replace(/[^0-9]/g, '');
    const num = raw === '' ? 0 : parseInt(raw, 10);
    setDisplay(raw === '' ? '' : num.toLocaleString('vi-VN'));
    onChange(num);
  };
  return <input type="text" inputMode="numeric" value={display} onChange={handleChange} placeholder={placeholder || '0'} style={style} className={className || 'money-input'} />;
};

const OrderModal = ({ onClose, onSave, initialData, isMobile }) => {
  const isEdit = !!initialData;
  const [isBundle, setIsBundle] = useState(initialData?.isBundle || false);
  const [date, setDate] = useState(initialData?.date || today());
  const [shipTotal, setShipTotal] = useState(initialData?.shipTotal || '');
  const [note, setNote] = useState(initialData?.note || '');
  const [tipAppAmount, setTipAppAmount] = useState(initialData?.tipApp || '');
  const [subOrders, setSubOrders] = useState(initialData?.subOrders || [{ id:genId(), type:'1', payShop:0, payShopMethod:'cash', collectCustomer:0, collectMethod:'cash', refund:0, refundMethod:'cash' }]);

  const addSub = () => setSubOrders(p=>[...p,{ id:genId(), type:'1', payShop:0, payShopMethod:'cash', collectCustomer:0, collectMethod:'cash', refund:0, refundMethod:'cash' }]);
  const updateSub = (i,v) => setSubOrders(p=>p.map((x,idx)=>idx===i?v:x));
  const removeSub = (i) => setSubOrders(p=>p.filter((_,idx)=>idx!==i));

  const ship = +shipTotal || 0;
  const totalChenhLech = subOrders.reduce((acc,s) => {
    if(s.type==='2') return acc + (s.orderAmount||0);
    if(s.type==='3') return acc + (s.orderAmount||0) - (s.payShop||0);
    if(s.type==='4') return acc - (s.payShop||0);
    return acc;
  }, 0);
  const appDelta = ship - totalChenhLech + (+tipAppAmount||0);

  const handleSave = () => {
    if(!ship) { alert('Nhập tiền ship đi bạn!'); return; }
    const order = { ...(initialData?._id ? { _id: initialData._id } : {}), date, isBundle, shipTotal:ship, note, tipApp:+tipAppAmount||0, subOrders };
    onSave(order); onClose();
  };

  return (
    <div className="modal-overlay">
      <div className="modal fade-in">
        <div className="flex justify-between items-center mb-6">
          <h2 style={{fontSize:20}}><Icon name="order" size={18}/>&nbsp; {isEdit ? 'Sửa đơn' : 'Nhập đơn mới'}</h2>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><Icon name="close" size={16}/></button>
        </div>
        <div className="grid gap-3 mb-4" style={{gridTemplateColumns:'1fr 1fr'}}>
          <div><label>Ngày</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} /></div>
          <div><label>Loại đơn</label>
            <div className="flex gap-2 mt-1">
              <button className={`chip ${!isBundle?'active':''}`} style={{flex:1}} onClick={()=>{setIsBundle(false);setSubOrders(s=>s.slice(0,1))}}>Đơn lẻ</button>
              <button className={`chip ${isBundle?'active':''}`} style={{flex:1}} onClick={()=>setIsBundle(true)}>Đơn ghép</button>
            </div>
          </div>
        </div>
        <div className="grid gap-3 mb-4" style={{gridTemplateColumns:'1fr 1fr'}}>
          <div><label>Tiền ship {isBundle?'(cả chùm)':''}(đ) *</label><MoneyInput value={+shipTotal||0} onChange={v=>setShipTotal(v)} placeholder="VD: 25000" /></div>
          <div><label>Tip app (nếu có)</label><MoneyInput value={+tipAppAmount||0} onChange={v=>setTipAppAmount(v)} placeholder="0" /></div>
        </div>
        <div className="section-title mb-2">Chi tiết {isBundle?'từng đơn trong chùm':'đơn'}</div>
        {subOrders.map((s,i)=>(<SubOrderForm key={s.id} index={i} data={s} onChange={v=>updateSub(i,v)} onRemove={()=>removeSub(i)} canRemove={subOrders.length>1} isMobile={isMobile} />))}
        {isBundle && (<button className="btn btn-ghost btn-sm mb-4" onClick={addSub} style={{width:'100%'}}><Icon name="plus" size={14}/> Thêm đơn con</button>)}
        <div className="mb-4"><label>Ghi chú</label><input placeholder="VD: khu vực xa, khách dễ tính..." value={note} onChange={e=>setNote(e.target.value)} /></div>
        <div className="p-3 rounded-xl mb-5" style={{background:'var(--bg)',border:'1px solid var(--border)'}}>
          <div className="section-title mb-2">Xem trước tác động</div>
          <div className="grid gap-2">
            <div className="flex justify-between"><span style={{fontSize:13,color:'var(--muted)'}}>Ví App thay đổi</span><span className="mono" style={{fontSize:13,color:appDelta>=0?'var(--green)':'var(--red)'}}>{appDelta>=0?'+':''}{fmtFull(appDelta)}</span></div>
            {subOrders.map((s,i)=>{
              const tipPhy = (s.collectCustomer||0) - (s.orderAmount||0) - (s.refund||0);
              const cashDelta = (s.collectMethod==='cash'?(s.collectCustomer||0):0) - (s.payShopMethod==='cash'?(s.payShop||0):0) - (s.refundMethod==='cash'?(s.refund||0):0);
              const mbDelta = (s.collectMethod==='mb'?(s.collectCustomer||0):0) - (s.payShopMethod==='mb'?(s.payShop||0):0);
              const momoDelta = -(s.payShopMethod==='momo'?(s.payShop||0):0) - (s.refundMethod==='momo'?(s.refund||0):0);
              return (
                <React.Fragment key={i}>
                  {cashDelta!==0 && <div className="flex justify-between"><span style={{fontSize:13,color:'var(--muted)'}}>Tiền mặt {isBundle?`(đơn #${i+1})`:''}</span><span className="mono" style={{fontSize:13,color:cashDelta>0?'var(--green)':'var(--red)'}}>{cashDelta>0?'+':''}{fmtFull(cashDelta)}</span></div>}
                  {mbDelta!==0 && <div className="flex justify-between"><span style={{fontSize:13,color:'var(--muted)'}}>MB Bank {isBundle?`(đơn #${i+1})`:''}</span><span className="mono" style={{fontSize:13,color:mbDelta>0?'var(--green)':'var(--red)'}}>{mbDelta>0?'+':''}{fmtFull(mbDelta)}</span></div>}
                  {momoDelta!==0 && <div className="flex justify-between"><span style={{fontSize:13,color:'var(--muted)'}}>Momo {isBundle?`(đơn #${i+1})`:''}</span><span className="mono" style={{fontSize:13,color:'var(--red)'}}>{fmtFull(momoDelta)}</span></div>}
                  {tipPhy>0 && <div className="flex justify-between"><span style={{fontSize:13,color:'var(--muted)'}}>Tip vật lý {isBundle?`(đơn #${i+1})`:''}</span><span className="mono" style={{fontSize:13,color:'var(--yellow)'}}>+{fmtFull(tipPhy)}</span></div>}
                </React.Fragment>
              );
            })}
          </div>
        </div>
        <div className="flex gap-3">
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Huỷ</button>
          <button className="btn btn-primary" style={{flex:2}} onClick={handleSave}>{isEdit ? 'Cập nhật đơn' : 'Lưu đơn'}</button>
        </div>
      </div>
    </div>
  );
};

const BackupModal = ({ data, onClose, onRestore }) => {
  const [tab, setTab] = useState('export');
  const [importText, setImportText] = useState('');
  const [importMode, setImportMode] = useState('merge');
  const [importResult, setImportResult] = useState(null);
  const [dragOver, setDragOver] = useState(false);

  const exportJSON = () => {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`shipflow_backup_${today()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const parseAndImport = (text) => {
    setImportResult(null);
    try {
      let parsed = JSON.parse(text.trim());
      if (!parsed.wallets || !parsed.orders) throw new Error('File JSON không đúng định dạng');
      if(importMode==='overwrite'){
        onRestore(parsed);
        setImportResult({ok:true,msg:`✅ Ghi đè thành công!`});
      }else{
        // ... (Logic merge rút gọn) ...
        onRestore(parsed); // Tạm dùng ghi đè cho json đơn giản
      }
    } catch(e){setImportResult({ok:false,msg:'❌ Lỗi: '+e.message});}
  };

  const handleFile = (file) => { const reader=new FileReader();reader.onload=e=>{setImportText(e.target.result);};reader.readAsText(file,'utf-8'); };
  const handleDrop = (e) => { e.preventDefault();setDragOver(false);const file=e.dataTransfer.files[0];if(file)handleFile(file); };

  return (
    <div className="modal-overlay">
      <div className="modal fade-in" style={{maxWidth:560}}>
        <div className="flex justify-between items-center mb-5">
          <h2 style={{fontSize:20}}>💾 Backup & Restore</h2>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><Icon name="close" size={16}/></button>
        </div>
        <div className="flex gap-1 mb-5">
          <button className={`tab-btn ${tab==='export'?'active':''}`} onClick={()=>setTab('export')}>📤 Xuất dữ liệu</button>
          <button className={`tab-btn ${tab==='import'?'active':''}`} onClick={()=>setTab('import')}>📥 Nhập dữ liệu</button>
        </div>
        {tab==='export' && (
          <div>
            <div className="grid gap-3" style={{gridTemplateColumns:'1fr'}}>
              <button className="btn btn-primary" style={{padding:'14px',fontSize:15}} onClick={exportJSON}>📄 Xuất file JSON</button>
            </div>
          </div>
        )}
        {tab==='import' && (
          <div>
            <div className="mb-4">
              <div className="flex gap-2">
                <button className={`chip ${importMode==='overwrite'?'active':''}`} style={{borderColor:'var(--red)',color:'var(--red)',background:'var(--red-dim)'}} onClick={()=>setImportMode('overwrite')}>⚠️ Ghi đè tất cả</button>
              </div>
            </div>
            <div onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)} onDrop={handleDrop}
              style={{border:`2px dashed ${dragOver?'var(--orange)':'var(--border)'}`,borderRadius:12,padding:'20px 16px',textAlign:'center',background:dragOver?'var(--orange-dim)':'var(--bg)',cursor:'pointer',marginBottom:12}}
              onClick={()=>document.getElementById('file-input').click()}>
              <div style={{fontSize:28,marginBottom:6}}>📂</div>
              <div style={{fontSize:13,color:'var(--muted)'}}>Kéo thả file vào đây hoặc <span style={{color:'var(--orange)'}}>click để chọn</span></div>
              <input id="file-input" type="file" accept=".json" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);}} />
            </div>
            <div className="mb-3"><label>Hoặc dán nội dung</label><textarea rows={5} value={importText} onChange={e=>setImportText(e.target.value)} style={{resize:'vertical',fontFamily:'Nunito',fontSize:11}} /></div>
            {importResult && (<div className="mb-3 p-3 rounded-xl" style={{background:importResult.ok?'var(--green-dim)':'var(--red-dim)',color:importResult.ok?'var(--green)':'var(--red)'}}>{importResult.msg}</div>)}
            <div className="flex gap-3">
              <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Đóng</button>
              <button className="btn btn-primary" style={{flex:2,background:'var(--red)'}} onClick={()=>parseAndImport(importText)} disabled={!importText.trim()}>⚠️ Ghi đè tất cả</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

const ChartPage = ({ data }) => {
  const [period, setPeriod] = useState('day');
  const { orders } = data;
  const chartData = useMemo(() => {
    const groups = {};
    orders.forEach(o => {
      let key = o.date;
      if(period==='week'){const d=new Date(o.date);const wk=Math.ceil(d.getDate()/7);key=`${o.date.slice(0,7)}-W${wk}`;}
      else if(period==='month'){key=o.date.slice(0,7);}
      else if(period==='year'){key=o.date.slice(0,4);}
      if(!groups[key]) groups[key]={key,ship:0,tip:0,total:0,orders:0};
      const tipPhy=o.subOrders.reduce((a,s)=>a+Math.max(0,(s.collectCustomer||0)-(s.orderAmount||0)-(s.refund||0)),0);
      groups[key].ship+=o.shipTotal;groups[key].tip+=tipPhy+(o.tipApp||0);groups[key].total+=o.shipTotal+tipPhy+(o.tipApp||0);groups[key].orders+=1;
    });
    return Object.values(groups).sort((a,b)=>a.key.localeCompare(b.key));
  }, [orders, period]);

  return (
    <div className="fade-in">
      <div className="chart-header mb-6" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><h2 style={{fontSize:24,marginBottom:4}}>Biểu đồ thu nhập</h2><p style={{color:'var(--muted)',fontSize:13}}>Theo thời gian</p></div>
        <div className="period-tabs flex gap-1">
          {[['day','Ngày'],['week','Tuần'],['month','Tháng'],['year','Năm']].map(([v,l])=>(<button key={v} className={`tab-btn ${period===v?'active':''}`} onClick={()=>setPeriod(v)} style={{whiteSpace:'nowrap'}}>{l}</button>))}
        </div>
      </div>
      {chartData.length === 0 ? (<div className="card" style={{padding:48,textAlign:'center',color:'var(--muted)'}}>Chưa có dữ liệu để hiển thị biểu đồ</div>) : (
        <>
          <div className="card p-5 mb-4"><div className="section-title mb-4">Công ship + Tip</div><ResponsiveContainer width="100%" height={260}><BarChart data={chartData} barGap={4}><CartesianGrid strokeDasharray="3 3" stroke="#2A3040" /><XAxis dataKey="key" tick={{fill:'#6B7A99',fontSize:11}} axisLine={false} tickLine={false} /><YAxis tick={{fill:'#6B7A99',fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>fmt(v)} /><Tooltip contentStyle={{background:'#1E2330',border:'1px solid #2A3040',borderRadius:10,fontFamily:'Nunito'}} labelStyle={{color:'#E8ECF4',marginBottom:4}} formatter={(v,n)=>[fmtFull(v),n==='ship'?'Công ship':'Tip']} /><Bar dataKey="ship" fill="#FF6B2B" radius={[4,4,0,0]} /><Bar dataKey="tip" fill="#FFD166" radius={[4,4,0,0]} /></BarChart></ResponsiveContainer></div>
          <div className="card p-5"><div className="section-title mb-4">Tổng thu nhập</div><ResponsiveContainer width="100%" height={220}><LineChart data={chartData}><CartesianGrid strokeDasharray="3 3" stroke="#2A3040" /><XAxis dataKey="key" tick={{fill:'#6B7A99',fontSize:11}} axisLine={false} tickLine={false} /><YAxis tick={{fill:'#6B7A99',fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>fmt(v)} /><Tooltip contentStyle={{background:'#1E2330',border:'1px solid #2A3040',borderRadius:10,fontFamily:'Nunito'}} formatter={(v)=>[fmtFull(v),'Thu nhập']} /><Line type="monotone" dataKey="total" stroke="#00E5A0" strokeWidth={2.5} dot={{fill:'#00E5A0',r:4}} /></LineChart></ResponsiveContainer></div>
        </>
      )}
    </div>
  );
};

const calcChenhLech = (subOrders) => subOrders.reduce((a,s)=>{
  if(s.forgotCollect){if(s.type==='2')return a+(s.orderAmount||0);if(s.type==='3')return a+(s.orderAmount||0)-(s.payShop||0);return a;}
  if(s.type==='2') return a+(s.orderAmount||0);
  if(s.type==='3') return a+(s.orderAmount||0)-(s.payShop||0);
  if(s.type==='4') return a-(s.payShop||0);
  return a;
},0);

const applySubWallet = (w, s, sign=1) => {
  if(!s.forgotCollect){
    if(s.collectMethod==='cash') w.cash+=sign*(s.collectCustomer||0);
    if(s.collectMethod==='mb') w.mb+=sign*(s.collectCustomer||0);
    if(s.refundMethod==='cash') w.cash-=sign*(s.refund||0);
    if(s.refundMethod==='momo') w.momo-=sign*(s.refund||0);
  }
  if(s.payShopMethod==='cash') w.cash-=sign*(s.payShop||0);
  if(s.payShopMethod==='momo') w.momo-=sign*(s.payShop||0);
  if(s.payShopMethod==='mb') w.mb-=sign*(s.payShop||0);
};

// ── App ───────────────────────────────────────────────────────────────────────
const App = () => {
  const [userId, setUserId] = useState(() => localStorage.getItem('spf_userId') || null);
  const [username, setUsername] = useState(() => localStorage.getItem('spf_user') || null);

  const [modal, setModal] = useState(null);
  const [editingOrder, setEditingOrder] = useState(null);
  const [editingTransfer, setEditingTransfer] = useState(null);
  const [editingTipApp, setEditingTipApp] = useState(null);
  const [editingCash, setEditingCash] = useState(null);
  const [showBackup, setShowBackup] = useState(false);
  const [showActionSheet, setShowActionSheet] = useState(false);
  const [data, setData] = useState(INITIAL);
  const [saving, setSaving] = useState(false);
  const [loadingData, setLoadingData] = useState(false);
  const isMobile = useIsMobile();

  useEffect(() => {
    if (!userId) return;
    setLoadingData(true);
    api.loadData(userId).then(d=>setData(d)).catch(e=>console.error('Load error:',e)).finally(()=>setLoadingData(false));
  }, [userId]);

  const handleLogin = (newUserId, newUsername) => {
    localStorage.setItem('spf_userId', newUserId); localStorage.setItem('spf_user', newUsername);
    setUserId(newUserId); setUsername(newUsername);
  };
  const handleLogout = () => {
    localStorage.removeItem('spf_userId'); localStorage.removeItem('spf_user');
    setUserId(null); setUsername(null); setData(INITIAL); setPage('dashboard');
  };
  const handleAction = (id) => {
    if (id === 'logout') { handleLogout(); return; }
    if (id === 'backup') { setShowBackup(true); return; }
    setModal(id);
  };
  const closeModals = () => {
    setModal(null); setEditingOrder(null); setEditingTransfer(null); setEditingTipApp(null); setEditingCash(null);
  };

  const applyOrder = useCallback(async (order) => {
    const isEdit = !!order._id;
    setData(prev => {
      const w={...prev.wallets};let orders=prev.orders;
      if(isEdit){const existing=prev.orders.find(o=>o._id===order._id);if(existing){w.app-=existing.shipTotal-calcChenhLech(existing.subOrders)+(existing.tipApp||0);existing.subOrders.forEach(s=>applySubWallet(w,s,-1));orders=prev.orders.map(o=>o._id===order._id?order:o);}}
      else{orders=[...prev.orders,order];}
      w.app+=order.shipTotal-calcChenhLech(order.subOrders)+(order.tipApp||0);
      order.subOrders.forEach(s=>applySubWallet(w,s,1));
      return {...prev,wallets:w,orders};
    });
    setSaving(true);
    try {
      if(isEdit) await api.updateOrder(userId,order);
      else{const newId=await api.addOrder(userId,order);setData(prev=>({...prev,orders:prev.orders.map(o=>o===order||(!o._id&&o.date===order.date&&o.shipTotal===order.shipTotal)?{...o,_id:newId}:o)}));}
      setData(prev=>{api.saveWallets(userId,prev.wallets).catch(console.error);return prev;});
    }catch(e){console.error('Save order error:',e);}finally{setSaving(false);}
  }, [userId]);

  const deleteOrder = useCallback(async (id) => {
    if(!confirm('Xoá đơn này? Số dư ví sẽ được hoàn lại.')) return;
    setData(prev=>{const order=prev.orders.find(o=>o._id===id);if(!order)return prev;const w={...prev.wallets};w.app-=order.shipTotal-calcChenhLech(order.subOrders)+(order.tipApp||0);order.subOrders.forEach(s=>applySubWallet(w,s,-1));return{...prev,wallets:w,orders:prev.orders.filter(o=>o._id!==id)};});
    setSaving(true);
    try{await api.deleteOrder(userId,id);setData(prev=>{api.saveWallets(userId,prev.wallets).catch(console.error);return prev;});}
    catch(e){console.error('Delete error:',e);}finally{setSaving(false);}
  }, [userId]);

  const applyTransfer = useCallback(async (t) => {
    const isEdit = !!t._id;
    setData(prev=>{
      const w={...prev.wallets}; let transfers = prev.transfers;
      if (isEdit) {
        const old = prev.transfers.find(x => x._id === t._id);
        if (old) { w[old.from] += old.amount; w[old.to] -= old.amount; }
        w[t.from] -= t.amount; w[t.to] += t.amount;
        transfers = prev.transfers.map(x => x._id === t._id ? t : x);
      } else { w[t.from] -= t.amount; w[t.to] += t.amount; transfers = [...prev.transfers, t]; }
      return{...prev, wallets:w, transfers};
    });
    setSaving(true);
    try{
      if (isEdit) await api.updateTransfer(userId, t);
      else { const newId=await api.addTransfer(userId,t); setData(prev=>({...prev,transfers:prev.transfers.map(x=>!x._id&&x.date===t.date&&x.amount===t.amount?{...x,_id:newId}:x)})); }
      setData(prev=>{api.saveWallets(userId,prev.wallets).catch(console.error);return prev;});
    }catch(e){console.error('Transfer error:',e);}finally{setSaving(false);}
  }, [userId]);

  const deleteTransfer = useCallback(async (id) => {
    if(!confirm('Xoá giao dịch chuyển tiền này?')) return;
    setData(prev=>{const t=prev.transfers.find(x=>x._id===id);if(!t)return prev;const w={...prev.wallets};w[t.from]+=t.amount;w[t.to]-=t.amount;return{...prev,wallets:w,transfers:prev.transfers.filter(x=>x._id!==id)};});
    setSaving(true);
    try{await api.deleteTransfer(userId,id);setData(prev=>{api.saveWallets(userId,prev.wallets).catch(console.error);return prev;});}
    catch(e){console.error('Delete transfer error:',e);}finally{setSaving(false);}
  }, [userId]);

  const applyTipApp = useCallback(async (t) => {
    const isEdit = !!t._id;
    setData(prev=>{
      const w={...prev.wallets}; let tipApp = prev.tipApp;
      if (isEdit) {
        const old = prev.tipApp.find(x => x._id === t._id);
        if (old) w.app -= old.amount;
        w.app += t.amount; tipApp = prev.tipApp.map(x => x._id === t._id ? t : x);
      } else { w.app += t.amount; tipApp = [...prev.tipApp, t]; }
      return{...prev, wallets:w, tipApp};
    });
    setSaving(true);
    try{
      if (isEdit) await api.updateTip(userId, t);
      else { const newId=await api.addTip(userId,t); setData(prev=>({...prev,tipApp:prev.tipApp.map(x=>!x._id&&x.date===t.date&&x.amount===t.amount?{...x,_id:newId}:x)})); }
      setData(prev=>{api.saveWallets(userId,prev.wallets).catch(console.error);return prev;});
    }catch(e){console.error('Tip error:',e);}finally{setSaving(false);}

  const deleteTip = useCallback(async (id) => {

    setSaving(true);
    try{await api.deleteTip(userId,id);setData(prev=>{api.saveWallets(userId,prev.wallets).catch(console.error);return prev;});}
    catch(e){console.error('Delete tip error:',e);}finally{setSaving(false);}
  }, [userId]);

  const applyCash = useCallback(async (tx) => {
    const isEdit = !!tx._id;
    setData(prev=>{
      const w={...prev.wallets}; let cashTx = prev.cashTx || [];
      if (isEdit) {
        const old = cashTx.find(x => x._id === tx._id);
        if (old) { if(old.txType==='deposit') w[old.wallet]-=old.amount; else w[old.wallet]+=old.amount; }
        if(tx.txType==='deposit') w[tx.wallet]+=tx.amount; else w[tx.wallet]-=tx.amount;
        cashTx = cashTx.map(x => x._id === tx._id ? tx : x);
      } else {
        if(tx.txType==='deposit') w[tx.wallet]+=tx.amount; else w[tx.wallet]-=tx.amount;
        cashTx = [...cashTx, tx];
      }
      return{...prev,wallets:w,cashTx};
    });
    setSaving(true);
    try{
      if (isEdit) await api.updateCash(userId, tx);
      else { const newId=await api.addCash(userId,tx); setData(prev=>({...prev,cashTx:(prev.cashTx||[]).map(x=>!x._id&&x.date===tx.date&&x.amount===tx.amount&&x.wallet===tx.wallet?{...x,_id:newId}:x)})); }
      setData(prev=>{api.saveWallets(userId,prev.wallets).catch(console.error);return prev;});
    }catch(e){console.error('Cash error:',e);}finally{setSaving(false);}
  }, [userId]);

  const deleteCash = useCallback(async (id) => {
    if(!confirm('Xoá giao dịch này? Số dư ví sẽ được hoàn lại.')) return;
    setData(prev=>{const tx=(prev.cashTx||[]).find(x=>x._id===id);if(!tx)return prev;const w={...prev.wallets};if(tx.txType==='deposit')w[tx.wallet]-=tx.amount;else w[tx.wallet]+=tx.amount;return{...prev,wallets:w,cashTx:(prev.cashTx||[]).filter(x=>x._id!==id)};});
    setSaving(true);
    try{await api.deleteCash(userId,id);setData(prev=>{api.saveWallets(userId,prev.wallets).catch(console.error);return prev;});}
    catch(e){console.error('Delete cash error:',e);}finally{setSaving(false);}
  }, [userId]);

  const editOrder = useCallback((o) => { setEditingOrder(o); setModal('order'); }, []);
  const editTransfer = useCallback((t) => { setEditingTransfer(t); setModal('transfer'); }, []);
  const editTipApp = useCallback((t) => { setEditingTipApp(t); setModal('tipapp'); }, []);
  const editCash = useCallback((t) => { setEditingCash(t); setModal('cash'); }, []);

  if (!userId) return <LoginScreen onLogin={handleLogin} />;
  if (loadingData) return (<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}><div style={{fontSize:28}}>⏳</div><div style={{fontFamily:'Nunito',fontSize:16,color:'var(--muted)'}}>Đang tải dữ liệu...</div></div>);

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <aside className="pc-sidebar" style={{width:220,background:'var(--surface)',borderRight:'1px solid var(--border)',padding:'24px 16px',display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh'}}>
        <div style={{marginBottom:28}}>
          <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:20,color:'var(--orange)',letterSpacing:'-0.02em'}}>ShipFlow</div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Shopee Food Tracker</div>
          <div style={{marginTop:8,display:'flex',alignItems:'center',justifyContent:'space-between'}}><span style={{fontSize:11,color:'var(--blue)',fontWeight:600}}>👤 {username}</span><span style={{fontSize:10,color:saving?'var(--yellow)':'var(--green)'}}>{saving ? '⏳...' : '✅'}</span></div>
        </div>
        <nav style={{flex:1}}>
          {[{id:'dashboard',label:'Tổng quan',icon:'dashboard'},{id:'chart',label:'Biểu đồ',icon:'chart'},{id:'history',label:'Lịch sử',icon:'history'}].map(p=>(<button key={p.id} className={`nav-item ${page===p.id?'active':''}`} onClick={()=>setPage(p.id)}><Icon name={p.icon} size={16}/> {p.label}</button>))}
        </nav>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:16,display:'flex',flexDirection:'column',gap:8}}>
          <div className="section-title">Thao tác nhanh</div>
          <button className="btn btn-primary btn-sm" onClick={()=>setModal('order')} style={{width:'100%'}}><Icon name="plus" size={13}/> Nhập đơn</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('transfer')} style={{width:'100%'}}><Icon name="transfer" size={13}/> Chuyển tiền</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('tipapp')} style={{width:'100%'}}><Icon name="tip" size={13}/> Tip App</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('cash')} style={{width:'100%',color:'var(--green)',borderColor:'#00E5A033'}}>💰 Nạp / Rút tiền</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('wallet')} style={{width:'100%'}}>⚙️ Số dư ban đầu</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowBackup(true)} style={{width:'100%'}}>💾 Backup / Restore</button>
          <button className="btn btn-ghost btn-sm" onClick={handleLogout} style={{width:'100%',color:'var(--red)',borderColor:'var(--red-dim)'}}>🚪 Đăng xuất</button>
        </div>
      </aside>

      <header className="mobile-header"><div className="mobile-header-brand"><span className="brand-name">ShipFlow</span></div><div className="mobile-header-meta"><span className="user-label">👤 {username}</span><span style={{color:'var(--border)'}}>·</span><span className={`save-status ${saving?'saving':''}`}>{saving ? '⏳' : '✅'}</span></div></header>

      <main className="pc-main" style={{flex:1,padding:'32px 36px',maxWidth:1100,margin:'0 auto',width:'100%'}}>
        {page==='dashboard' && <Dashboard data={data} />}
        {page==='chart' && <ChartPage data={data} />}
        {page==='history' && <HistoryPage data={data} onDeleteOrder={deleteOrder} onEditOrder={editOrder} onDeleteTransfer={deleteTransfer} onEditTransfer={editTransfer} onDeleteTip={deleteTip} onEditTip={editTipApp} onDeleteCash={deleteCash} onEditCash={editCash} />}
      </main>

      <nav className="mobile-bottom-nav">
        <button className={`nav-tab ${page==='dashboard'?'active':''}`} onClick={()=>setPage('dashboard')}><Icon name="dashboard" size={20}/><span>Tổng quan</span></button>
        <button className={`nav-tab ${page==='chart'?'active':''}`} onClick={()=>setPage('chart')}><Icon name="chart" size={20}/><span>Biểu đồ</span></button>
        <div className="nav-fab-slot"><button className="mobile-fab" onClick={()=>setShowActionSheet(true)}><Icon name="plus" size={22}/></button></div>
        <button className={`nav-tab ${page==='history'?'active':''}`} onClick={()=>setPage('history')}><Icon name="history" size={20}/><span>Lịch sử</span></button>
        <button className="nav-tab" onClick={handleLogout} style={{color: 'var(--red)'}}><Icon name="logout" size={20}/><span>Đăng xuất</span></button>
      </nav>

      {showActionSheet && <MobileActionSheet onClose={()=>setShowActionSheet(false)} onAction={handleAction} />}
      {modal==='order' && <OrderModal onClose={closeModals} onSave={applyOrder} initialData={editingOrder} isMobile={isMobile} />}
      {modal==='transfer' && <TransferModal onClose={closeModals} onSave={applyTransfer} initialData={editingTransfer} />}
      {modal==='tipapp' && <TipAppModal onClose={closeModals} onSave={applyTipApp} initialData={editingTipApp} />}
      {modal==='cash' && <CashModal onClose={closeModals} onSave={applyCash} initialData={editingCash} />}
      {modal==='wallet' && <WalletSetupModal wallets={data.wallets} onSave={w=>{setData(p=>({...p,wallets:w}));api.saveWallets(userId,w).catch(console.error);}} onClose={closeModals} />}
      {showBackup && <BackupModal data={data} onClose={()=>setShowBackup(false)} onRestore={async (newData)=>{setData(newData);setShowBackup(false);setSaving(true);try{await api.saveAll(userId,newData);}catch(e){console.error(e);}finally{setSaving(false);}}} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
