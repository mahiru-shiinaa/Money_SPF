<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShipFlow – Quản lý dòng tiền Shopee Food</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap');</style>
  <style>
    :root {
      --orange: #FF6B2B;
      --orange-dim: #FF6B2B22;
      --green: #00E5A0;
      --green-dim: #00E5A015;
      --red: #FF4D6A;
      --red-dim: #FF4D6A15;
      --blue: #4D9EFF;
      --blue-dim: #4D9EFF15;
      --yellow: #FFD166;
      --yellow-dim: #FFD16615;
      --purple: #A78BFA;
      --purple-dim: #A78BFA15;
      --bg: #0D0F14;
      --surface: #161922;
      --surface2: #1E2330;
      --border: #2A3040;
      --text: #E8ECF4;
      --muted: #6B7A99;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }
    h1, h2, h3, .font-display { font-family: 'Nunito', sans-serif; }
    .mono { font-family: 'Nunito', sans-serif; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #3A4560; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.orange::before { background: var(--orange); }
    .stat-card.green::before { background: var(--green); }
    .stat-card.blue::before { background: var(--blue); }
    .stat-card.yellow::before { background: var(--yellow); }
    .stat-card.red::before { background: var(--red); }
    .stat-card.purple::before { background: var(--purple); }

    .tab-btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      background: transparent;
      color: var(--muted);
    }
    .tab-btn.active {
      background: var(--orange);
      color: white;
    }
    .tab-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }

    input:not([type=number]):not([type=checkbox]):not([type=radio]):not([type=file]):not([type=range]):not(.no-pad-left) {
      padding-left: 14px !important;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 11px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      width: 100%;
      height: 44px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    textarea { height: auto; min-height: 44px; }
    .money-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 11px 14px; font-family: 'Nunito', sans-serif; font-size: 14px; width: 100%; height: 44px; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
    .money-input:focus { border-color: var(--orange); }
    input:focus, select:focus { border-color: var(--orange); }
    select option { background: var(--surface2); }
    label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; display: block; }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
    }
    .btn-primary { background: var(--orange); color: white; }
    .btn-primary:hover { background: #e55a1f; transform: translateY(-1px); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid #FF4D6A44; }
    .btn-danger:hover { background: var(--red); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
    }
    .badge-orange { background: var(--orange-dim); color: var(--orange); }
    .badge-green { background: var(--green-dim); color: var(--green); }
    .badge-red { background: var(--red-dim); color: var(--red); }
    .badge-blue { background: var(--blue-dim); color: var(--blue); }
    .badge-yellow { background: var(--yellow-dim); color: var(--yellow); }

    table { width: 100%; border-collapse: collapse; }
    th { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #1E2330; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .neu { color: var(--muted); }

    .section-title {
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    /* ── PC Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%; max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 28px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-track { background: transparent; }
    .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .order-sub-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .chip {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0 20px;
      height: 44px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }
    .chip.active { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
    .chip:hover:not(.active) { border-color: #3A4560; color: var(--text); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,106,0); border-color: #FF4D6A55; }
      50% { box-shadow: 0 0 0 6px rgba(255,77,106,0.12); border-color: #FF4D6Aaa; }
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--muted);
      transition: all 0.15s;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }
    .nav-item.active { background: var(--orange-dim); color: var(--orange); }
    .nav-item:hover:not(.active) { background: var(--surface2); color: var(--text); }

    .number-big {
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 500;
    }

    /* ════════════════════════════════════════════
       MOBILE STYLES  (≤ 768px)
    ════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .mobile-header {
        display: flex !important;
        position: fixed; top: 0; left: 0; right: 0; z-index: 50;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 16px;
        height: 56px;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1px;
      }
      .mobile-header-brand { display: flex; align-items: center; gap: 8px; }
      .mobile-header-brand .brand-name { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 18px; color: var(--orange); letter-spacing: -0.02em; }
      .mobile-header-meta { display: flex; align-items: center; gap: 10px; font-size: 11px; }
      .mobile-header-meta .user-label { color: var(--blue); font-weight: 600; }
      .mobile-header-meta .save-status { color: var(--green); font-weight: 600; }
      .mobile-header-meta .save-status.saving { color: var(--yellow); }

      aside.pc-sidebar { display: none !important; }

      .mobile-bottom-nav {
        display: flex !important;
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
        background: var(--surface);
        border-top: 1px solid var(--border);
        height: 60px;
        align-items: center;
        padding: 0 4px;
      }
      .mobile-bottom-nav .nav-tab {
        flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
        cursor: pointer; padding: 6px 4px; border: none; background: transparent; color: var(--muted);
        font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 600; border-radius: 10px;
        transition: all 0.15s; height: 52px;
      }
      .mobile-bottom-nav .nav-tab.active { color: var(--orange); }
      .mobile-bottom-nav .nav-tab svg { display: block; }
      .mobile-bottom-nav .nav-fab-slot { flex: 1; display: flex; align-items: center; justify-content: center; }
      .mobile-fab {
        width: 52px; height: 52px; border-radius: 50%; background: var(--orange); border: none;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        box-shadow: 0 4px 20px rgba(255,107,43,0.45); transition: all 0.18s; color: white;
        font-size: 24px; font-weight: 300; line-height: 1; position: relative; top: -8px;
      }
      .mobile-fab:active { transform: scale(0.93); }

      .pc-main { padding: 72px 14px 78px !important; max-width: 100% !important; margin: 0 !important; }
      .wallet-grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
      .income-grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
      .stat-card { padding: 14px 14px; }
      .number-big { font-size: 17px !important; }

      .history-table-wrap { display: none !important; }
      .history-cards-wrap { display: block !important; }

      .m-order-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; margin-bottom: 10px; }
      .m-order-card-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
      .m-order-card-row:last-child { margin-bottom: 0; }
      .m-transfer-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; margin-bottom: 10px; }
      .m-tip-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
      .m-cash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }

      .modal-overlay { align-items: flex-end !important; padding: 0 !important; }
      .modal { border-radius: 20px 20px 0 0 !important; max-width: 100% !important; width: 100% !important; max-height: 92vh !important; padding: 20px 18px 32px !important; animation: slideUp 0.3s cubic-bezier(0.34,1.36,0.64,1) !important; }
      @keyframes slideUp { from { transform: translateY(100%); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
      .modal::before { content: ''; display: block; width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }

      .type-chip-row { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
      .type-chip-row .chip { height: 40px !important; font-size: 12px !important; padding: 0 8px !important; width: 100% !important; }
      .chart-header { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
      .period-tabs { overflow-x: auto; white-space: nowrap; display: flex; gap: 4px; padding-bottom: 4px; }
      .period-tabs::-webkit-scrollbar { display: none; }

      .action-sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; }
      .action-sheet { width: 100%; background: var(--surface); border-radius: 24px 24px 0 0; padding: 8px 16px 36px; animation: slideUp 0.28s cubic-bezier(0.34,1.36,0.64,1); }
      .action-sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
      .action-sheet-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; text-align: center; }
      .action-item { display: flex; align-items: center; gap: 14px; padding: 14px 12px; border-radius: 12px; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
      .action-item:active { background: var(--surface2); }
      .action-item .action-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
      .action-item .action-desc { font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 2px; }
      .action-sheet-divider { height: 1px; background: var(--border); margin: 6px 0; }
      .action-item-cancel { display: flex; align-items: center; justify-content: center; padding: 13px; border-radius: 12px; cursor: pointer; border: none; background: var(--surface2); width: 100%; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: var(--muted); margin-top: 8px; -webkit-tap-highlight-color: transparent; }

      .tab-btn { padding: 7px 12px; font-size: 12px; }
      .history-tabs { overflow-x: auto; white-space: nowrap; display: flex; gap: 4px; padding-bottom: 4px; }
      .history-tabs::-webkit-scrollbar { display: none; }
      .history-empty td { padding: 20px !important; }
      .dash-title { font-size: 18px !important; }
      .dash-sub { font-size: 12px !important; }
    }
    .mobile-header { display: none; }
    .mobile-bottom-nav { display: none; }
    .history-cards-wrap { display: none; }
    .action-sheet-overlay { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, LineChart, Line, CartesianGrid } = Recharts;

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = (n) => {
  const abs = Math.abs(n);
  const s = abs >= 1000 ? (abs/1000).toFixed(abs%1000===0?0:1)+'k' : abs.toString();
  return (n < 0 ? '-' : '') + s;
};
const fmtFull = (n) => new Intl.NumberFormat('vi-VN').format(n) + 'đ';
const today = () => new Date().toISOString().split('T')[0];
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);

// HÀM SẮP XẾP CHUẨN: Mới nhất lên đầu
const getSortedListDesc = (arr) => {
  return [...arr].map((item, idx) => ({ item, idx })).sort((a, b) => {
    if (a.item.date !== b.item.date) return a.item.date > b.item.date ? -1 : 1;
    return b.idx - a.idx;
  }).map(x => x.item);
};

const INITIAL = {
  wallets: { app: 0, momo: 0, mb: 0, cash: 0 },
  orders: [], transfers: [], tipApp: [], cashTx: [],
};

// ── API ───────────────────────────────────────────────────────────────────────
const api = {
  async loadData(userId) {
    const r = await fetch(`/api/data?userId=${encodeURIComponent(userId)}`);
    if (!r.ok) throw new Error('Không tải được dữ liệu');
    return r.json();
  },
  async saveWallets(userId, wallets) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'saveWallets',data:{wallets}}) });
  },
  async addOrder(userId, order) {
    const r = await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'addOrder',data:order}) });
    return (await r.json())._id;
  },
  async updateOrder(userId, order) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'updateOrder',data:order}) });
  },
  async deleteOrder(userId, orderId) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'deleteOrder',data:{_id:orderId}}) });
  },
  async addTransfer(userId, transfer) {
    const r = await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'addTransfer',data:transfer}) });
    return (await r.json())._id;
  },
  async updateTransfer(userId, transfer) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'updateTransfer',data:transfer}) });
  },
  async deleteTransfer(userId, transferId) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'deleteTransfer',data:{_id:transferId}}) });
  },
  async addTip(userId, tip) {
    const r = await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'addTip',data:tip}) });
    return (await r.json())._id;
  },
  async updateTip(userId, tip) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'updateTip',data:tip}) });
  },
  async deleteTip(userId, tipId) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'deleteTip',data:{_id:tipId}}) });
  },
  async addCash(userId, tx) {
    const r = await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'addCash',data:tx}) });
    return (await r.json())._id;
  },
  async updateCash(userId, tx) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'updateCash',data:tx}) });
  },
  async deleteCash(userId, txId) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'deleteCash',data:{_id:txId}}) });
  },
  async saveAll(userId, data) {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId,action:'saveAll',data}) });
  },
  async auth(username, action) {
    const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,action}) });
    return { ok:r.ok, data:await r.json() };
  },
};

const useIsMobile = () => {
  const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener('resize', handler); return () => window.removeEventListener('resize', handler);
  }, []);
  return isMobile;
};

const Icon = ({ name, size=16 }) => {
  const icons = {
    dashboard: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
    order: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>,
    transfer: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>,
    chart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,

const WalletCard = ({ label, value, color, icon, warnNegative }) => {
  const isNeg = warnNegative && value < 0;
  return (
    <div className={`stat-card ${isNeg ? 'red' : color}`} style={isNeg ? { borderColor:'#FF4D6A55', animation:'pulse-red 1.8s ease-in-out infinite' } : {}}>

      </div>
      <div className="number-big" style={{color: isNeg ? 'var(--red)' : 'var(--text)'}}>{fmtFull(value)}</div>

    </div>

const MoneyInput = ({ value, onChange, placeholder, style, className }) => {
  const [display, setDisplay] = React.useState(value ? Number(value).toLocaleString('vi-VN') : '');
  React.useEffect(() => {
    if (!value && value !== 0) { setDisplay(''); return; }
    const num = Number(value);
    if (!isNaN(num)) setDisplay(num === 0 ? '' : num.toLocaleString('vi-VN'));
  }, [value]);
  const handleChange = (e) => {
    const raw = e.target.value.replace(/\./g, '').replace(/[^0-9]/g, '');
    const num = raw === '' ? 0 : parseInt(raw, 10);
    setDisplay(raw === '' ? '' : num.toLocaleString('vi-VN'));
    onChange(num);
  };
  return <input type="text" inputMode="numeric" value={display} onChange={handleChange} placeholder={placeholder || '0'} style={style} className={className || 'money-input'} />;
};

const Pagination = ({ current, total, onChange }) => {
  if (total <= 1) return null;
  return (
    <div className="flex items-center justify-center gap-2 mt-6">
      <button className="btn btn-sm btn-ghost" disabled={current === 1} onClick={() => onChange(current - 1)}>
        ⬅️ Trước
      </button>
      <span style={{fontSize: 13, color: 'var(--muted)', fontWeight: 700, margin: '0 8px', minWidth: '70px', textAlign: 'center'}}>
        Trang {current} / {total}
      </span>
      <button className="btn btn-sm btn-ghost" disabled={current === total} onClick={() => onChange(current + 1)}>
        Sau ➡️
      </button>
    </div>
  );
};

          <thead><tr><th>Ngày</th><th>Loại</th><th>Ship</th><th>Tip vật lý</th><th>Ví App Δ</th><th>Ghi chú</th></tr></thead>
          <tbody>
            {paginatedOrders.length === 0 && (<tr><td colSpan={6} style={{textAlign:'center',padding:40,color:'var(--muted)'}}>Chưa có dữ liệu</td></tr>)}
            {paginatedOrders.map(o=>{
              const tp=o.subOrders.reduce((a,s)=>a+Math.max(0,(s.collectCustomer||0)-(s.orderAmount||0)-(s.refund||0)),0);
              const cl=o.subOrders.reduce((a,s)=>{if(s.type==='2')return a+(s.orderAmount||0);if(s.type==='3')return a+(s.orderAmount||0)-(s.payShop||0);return a;},0);
              const ad=o.shipTotal-cl+(o.tipApp||0);
              return (<tr key={o._id}><td>{o.date}</td><td><span className={`badge ${o.isBundle?'badge-blue':'badge-orange'}`}>{o.isBundle?'Ghép':'Lẻ'}</span></td><td className="pos">+{fmt(o.shipTotal)}</td><td className="text-[#FFD166]">{tp>0?'+'+fmt(tp):'-'}</td><td className={ad>=0?'pos':'neg'}>{ad>=0?'+':''}{fmt(ad)}</td><td className="text-xs text-[#6B7A99]">{o.note||'-'}</td></tr>);
            })}
          </tbody>
        </table>
      </div>
      <Pagination current={currentPage} total={totalPages} onChange={setCurrentPage} />
    </div>
  );
};

// ── Components: History ────────────────────────────────────────────────────
const HistoryPage = ({ data, onDeleteOrder, onDeleteTransfer, onDeleteTip, onDeleteCash, onEditOrder, onEditTransfer, onEditTip, onEditCash }) => {
  const [tab, setTab] = useState('orders');
  const [currentPage, setCurrentPage] = useState(1);
  const itemsPerPage = 12;

  const sortedList = useMemo(() => {
    let raw = [];
    if(tab==='orders') raw = data.orders;
    else if(tab==='transfers') raw = data.transfers;
    else if(tab==='tipapp') raw = data.tipApp;
    else raw = data.cashTx || [];
    return getSortedListDesc(raw);
  }, [tab, data]);

  const totalPages = Math.ceil(sortedList.length / itemsPerPage) || 1;
  const list = sortedList.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

  const handleTab = (t) => { setTab(t); setCurrentPage(1); };

  return (
    <div className="fade-in">
      <div className="mb-6"><h2 style={{fontSize:24}}>Lịch sử</h2>
        <div className="history-tabs flex gap-1 mt-4 overflow-x-auto pb-2">
          {[['orders','🥡 Đơn hàng'],['transfers','💸 Chuyển tiền'],['tipapp','💳 Tip App'],['cashtx','💰 Nạp/Rút']].map(([k,l])=>(
            <button key={k} className={`tab-btn whitespace-nowrap ${tab===k?'active':''}`} onClick={()=>handleTab(k)}>{l}</button>
          ))}
        </div>
      </div>

      <div className="card history-table-wrap">
        <table>
          {tab==='orders' && (
            <>
              <thead><tr><th>Ngày</th><th>Loại</th><th>Ship</th><th>Tip VL</th><th>App Δ</th><th>Cash Δ</th><th>Hành động</th></tr></thead>
              <tbody>
                {list.map(o=>{
                  const cl=o.subOrders.reduce((a,s)=>{if(s.type==='2')return a+(s.orderAmount||0);if(s.type==='3')return a+(s.orderAmount||0)-(s.payShop||0);return a;},0);
                  const cd=o.subOrders.reduce((a,s)=>{let d=0;if(s.collectMethod==='cash')d+=(s.collectCustomer||0);if(s.payShopMethod==='cash')d-=(s.payShop||0);if(s.refundMethod==='cash')d-=(s.refund||0);return a+d;},0);
                  return (<tr key={o._id}><td>{o.date}</td><td><span className={`badge ${o.isBundle?'badge-blue':'badge-orange'}`}>{o.isBundle?'Ghép':'Lẻ'}</span></td><td className="pos">+{fmt(o.shipTotal)}</td><td className="text-[#FFD166]">+{fmt(o.subOrders.reduce((a,s)=>a+Math.max(0,(s.collectCustomer||0)-(s.orderAmount||0)-(s.refund||0)),0))}</td><td className={o.shipTotal-cl>=0?'pos':'neg'}>{fmt(o.shipTotal-cl)}</td><td className={cd>=0?'pos':'neg'}>{fmt(cd)}</td><td><div className="flex gap-2"><button onClick={()=>onEditOrder(o)}>✏️</button><button onClick={()=>onDeleteOrder(o._id)}>🗑️</button></div></td></tr>);
                })}
              </tbody>
            </>
          )}
          {tab==='transfers' && (
            <>
              <thead><tr><th>Ngày</th><th>Từ</th><th>Đến</th><th>Số tiền</th><th>Ghi chú</th><th>Hành động</th></tr></thead>
              <tbody>{list.map(t=>(<tr key={t._id}><td>{t.date}</td><td><span className="badge badge-red">{t.from}</span></td><td><span className="badge badge-green">{t.to}</span></td><td className="mono">{fmtFull(t.amount)}</td><td className="text-xs">{t.note||'-'}</td><td><div className="flex gap-2"><button onClick={()=>onEditTransfer(t)}>✏️</button><button onClick={()=>onDeleteTransfer(t._id)}>🗑️</button></div></td></tr>))}</tbody>
            </>
          )}
          {tab==='tipapp' && (
            <>
              <thead><tr><th>Ngày</th><th>Số tiền</th><th>Hành động</th></tr></thead>
              <tbody>{list.map(t=>(<tr key={t._id}><td>{t.date}</td><td className="pos">+{fmtFull(t.amount)}</td><td><div className="flex gap-2"><button onClick={()=>onEditTip(t)}>✏️</button><button onClick={()=>onDeleteTip(t._id)}>🗑️</button></div></td></tr>))}</tbody>
            </>
          )}
          {tab==='cashtx' && (
            <>
              <thead><tr><th>Ngày</th><th>Loại</th><th>Ví</th><th>Số tiền</th><th>Hành động</th></tr></thead>
              <tbody>{list.map(t=>(<tr key={t._id}><td>{t.date}</td><td><span className={`badge ${t.txType==='deposit'?'badge-green':'badge-red'}`}>{t.txType==='deposit'?'Nạp':'Rút'}</span></td><td>{t.wallet}</td><td className={t.txType==='deposit'?'pos':'neg'}>{fmtFull(t.amount)}</td><td><div className="flex gap-2"><button onClick={()=>onEditCash(t)}>✏️</button><button onClick={()=>onDeleteCash(t._id)}>🗑️</button></div></td></tr>))}</tbody>
            </>
          )}
        </table>
      </div>
      <Pagination current={currentPage} total={totalPages} onChange={setCurrentPage} />
    </div>
  );
};

// ── App Container ──────────────────────────────────────────────────────────
const App = () => {
  const [userId, setUserId] = useState(() => localStorage.getItem('spf_userId') || null);
  const [username, setUsername] = useState(() => localStorage.getItem('spf_user') || null);
  const [page, setPage] = useState('dashboard');
  const [modal, setModal] = useState(null);
  const [editingItem, setEditingItem] = useState(null);
  const [data, setData] = useState(INITIAL);
  const [saving, setSaving] = useState(false);
  const isMobile = useIsMobile();

  useEffect(() => {
    if (userId) api.loadData(userId).then(setData).catch(console.error);
  }, [userId]);

  const saveWallets = (w) => {
    setData(prev => ({...prev, wallets: w}));
    api.saveWallets(userId, w).catch(console.error);
  };

  const applyOrder = async (order) => {
    const isEdit = !!order._id;
    setSaving(true);
    setData(prev => {
      const w = {...prev.wallets};
      if(isEdit){
        const old = prev.orders.find(o=>o._id===order._id);
        const old_cl = calcChenhLech(old.subOrders);
        w.app -= (old.shipTotal - old_cl + old.tipApp);
        old.subOrders.forEach(s => applySubWallet(w, s, -1));
      }
      const new_cl = calcChenhLech(order.subOrders);
      w.app += (order.shipTotal - new_cl + order.tipApp);
      order.subOrders.forEach(s => applySubWallet(w, s, 1));
      
      const newOrders = isEdit ? prev.orders.map(o=>o._id===order._id?order:o) : [...prev.orders, order];
      api.saveWallets(userId, w);
      return {...prev, wallets: w, orders: newOrders};
    });
    
    if(isEdit) await api.updateOrder(userId, order);
    else {
      const id = await api.addOrder(userId, order);
      setData(prev => ({...prev, orders: prev.orders.map(o=>o===order?{...o,_id:id}:o)}));
    }
    setSaving(false);
  };

  const deleteOrder = async (id) => {
    if(!confirm('Xoá đơn này?')) return;
    setData(prev => {
      const o = prev.orders.find(x=>x._id===id);
      const w = {...prev.wallets};
      const cl = calcChenhLech(o.subOrders);
      w.app -= (o.shipTotal - cl + o.tipApp);
      o.subOrders.forEach(s => applySubWallet(w, s, -1));
      api.saveWallets(userId, w);
      api.deleteOrder(userId, id);
      return {...prev, wallets: w, orders: prev.orders.filter(x=>x._id!==id)};
    });
  };

  const applyTransfer = async (t) => {
    const isEdit = !!t._id;
    setData(prev => {
      const w = {...prev.wallets};
      if(isEdit){
        const old = prev.transfers.find(x=>x._id===t._id);
        w[old.from] += old.amount; w[old.to] -= old.amount;
      }
      w[t.from] -= t.amount; w[t.to] += t.amount;
      const newList = isEdit ? prev.transfers.map(x=>x._id===t._id?t:x) : [...prev.transfers, t];
      api.saveWallets(userId, w);
      return {...prev, wallets: w, transfers: newList};
    });
    if(isEdit) await api.updateTransfer(userId, t);
    else {
      const id = await api.addTransfer(userId, t);
      setData(prev => ({...prev, transfers: prev.transfers.map(x=>x===t?{...x,_id:id}:x)}));
    }
  };

  const applyTip = async (t) => {
    const isEdit = !!t._id;
    setData(prev => {
      const w = {...prev.wallets};
      if(isEdit) w.app -= prev.tipApp.find(x=>x._id===t._id).amount;
      w.app += t.amount;
      const newList = isEdit ? prev.tipApp.map(x=>x._id===t._id?t:x) : [...prev.tipApp, t];
      api.saveWallets(userId, w);
      return {...prev, wallets: w, tipApp: newList};
    });
    if(isEdit) await api.updateTip(userId, t);
    else {
      const id = await api.addTip(userId, t);
      setData(prev => ({...prev, tipApp: prev.tipApp.map(x=>x===t?{...x,_id:id}:x)}));
    }
  };

  const applyCash = async (tx) => {
    const isEdit = !!tx._id;
    setData(prev => {
      const w = {...prev.wallets};
      if(isEdit){
        const old = prev.cashTx.find(x=>x._id===tx._id);
        if(old.txType==='deposit') w[old.wallet]-=old.amount; else w[old.wallet]+=old.amount;
      }
      if(tx.txType==='deposit') w[tx.wallet]+=tx.amount; else w[tx.wallet]-=tx.amount;
      const newList = isEdit ? prev.cashTx.map(x=>x._id===tx._id?tx:x) : [...(prev.cashTx||[]), tx];
      api.saveWallets(userId, w);
      return {...prev, wallets: w, cashTx: newList};
    });
    if(isEdit) await api.updateCash(userId, tx);
    else {
      const id = await api.addCash(userId, tx);
      setData(prev => ({...prev, cashTx: prev.cashTx.map(x=>x===tx?{...x,_id:id}:x)}));
    }
  };

  if (!userId) return <LoginScreen onLogin={(id, u)=>{ localStorage.setItem('spf_userId', id); localStorage.setItem('spf_user', u); setUserId(id); setUsername(u); }} />;

  return (
    <div style={{display:'flex', minHeight:'100vh'}}>
      <aside className="pc-sidebar" style={{width:220, background:'var(--surface)', borderRight:'1px solid var(--border)', padding:'24px 16px', display:'flex', flexDirection:'column', position:'sticky', top:0, height:'100vh'}}>
        <div style={{marginBottom:28}}>
          <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:20,color:'var(--orange)'}}>ShipFlow</div>
          <div style={{fontSize:11,color:'var(--blue)',marginTop:8}}>👤 {username} {saving && '⏳'}</div>
        </div>
        <nav style={{flex:1}}>
          <button className={`nav-item ${page==='dashboard'?'active':''}`} onClick={()=>setPage('dashboard')}><Icon name="dashboard"/> Tổng quan</button>
          <button className={`nav-item ${page==='history'?'active':''}`} onClick={()=>setPage('history')}><Icon name="history"/> Lịch sử</button>
        </nav>
        <div className="flex flex-col gap-2 pt-4 border-t border-[#2A3040]">
          <button className="btn btn-primary btn-sm" onClick={()=>setModal('order')}>+ Nhập đơn</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('transfer')}>💸 Chuyển tiền</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('tipapp')}>💳 Tip App</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('cash')}>💰 Nạp/Rút</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('wallet')}>⚙️ Cài đặt ví</button>
          <button className="btn btn-ghost btn-sm text-red-400" onClick={()=>{localStorage.clear(); location.reload();}}>🚪 Đăng xuất</button>
        </div>
      </aside>

      <main className="pc-main flex-1 p-8 max-w-[1100px] mx-auto w-full">
        {page==='dashboard' ? <Dashboard data={data} /> : 
         <HistoryPage data={data} 
           onDeleteOrder={deleteOrder} onEditOrder={(o)=>{setEditingItem(o); setModal('order');}}
           onDeleteTransfer={(id)=>{if(confirm('Xoá?')){const t=data.transfers.find(x=>x._id===id); const w={...data.wallets}; w[t.from]+=t.amount; w[t.to]-=t.amount; saveWallets(w); api.deleteTransfer(userId,id); setData(p=>({...p,transfers:p.transfers.filter(x=>x._id!==id)}));}}}
           onEditTransfer={(t)=>{setEditingItem(t); setModal('transfer');}}
           onDeleteTip={(id)=>{if(confirm('Xoá?')){const t=data.tipApp.find(x=>x._id===id); const w={...data.wallets}; w.app-=t.amount; saveWallets(w); api.deleteTip(userId,id); setData(p=>({...p,tipApp:p.tipApp.filter(x=>x._id!==id)}));}}}
           onEditTip={(t)=>{setEditingItem(t); setModal('tipapp');}}
           onDeleteCash={(id)=>{if(confirm('Xoá?')){const t=data.cashTx.find(x=>x._id===id); const w={...data.wallets}; if(t.txType==='deposit') w[t.wallet]-=t.amount; else w[t.wallet]+=t.amount; saveWallets(w); api.deleteCash(userId,id); setData(p=>({...p,cashTx:p.cashTx.filter(x=>x._id!==id)}));}}}
           onEditCash={(t)=>{setEditingItem(t); setModal('cash');}}
         />}
      </main>

      {modal==='order' && <OrderModal initialData={editingItem} onClose={()=>{setModal(null); setEditingItem(null);}} onSave={applyOrder} isMobile={isMobile} />}
      {modal==='transfer' && <TransferModal initialData={editingItem} onClose={()=>{setModal(null); setEditingItem(null);}} onSave={applyTransfer} />}
      {modal==='tipapp' && <TipAppModal initialData={editingItem} onClose={()=>{setModal(null); setEditingItem(null);}} onSave={applyTip} />}
      {modal==='cash' && <CashModal initialData={editingItem} onClose={()=>{setModal(null); setEditingItem(null);}} onSave={applyCash} />}
      {modal==='wallet' && <WalletSetupModal wallets={data.wallets} onSave={saveWallets} onClose={()=>setModal(null)} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
