<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShipFlow – Quản lý dòng tiền Shopee Food</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap');</style>
  <style>
    :root {
      --orange: #FF6B2B;
      --orange-dim: #FF6B2B22;
      --green: #00E5A0;
      --green-dim: #00E5A015;
      --red: #FF4D6A;
      --red-dim: #FF4D6A15;
      --blue: #4D9EFF;
      --blue-dim: #4D9EFF15;
      --yellow: #FFD166;
      --yellow-dim: #FFD16615;
      --purple: #A78BFA;
      --purple-dim: #A78BFA15;
      --bg: #0D0F14;
      --surface: #161922;
      --surface2: #1E2330;
      --border: #2A3040;
      --text: #E8ECF4;
      --muted: #6B7A99;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }
    h1, h2, h3, .font-display { font-family: 'Nunito', sans-serif; }
    .mono { font-family: 'Nunito', sans-serif; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #3A4560; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.orange::before { background: var(--orange); }
    .stat-card.green::before { background: var(--green); }
    .stat-card.blue::before { background: var(--blue); }
    .stat-card.yellow::before { background: var(--yellow); }
    .stat-card.red::before { background: var(--red); }
    .stat-card.purple::before { background: var(--purple); }

    .tab-btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      background: transparent;
      color: var(--muted);
    }
    .tab-btn.active {
      background: var(--orange);
      color: white;
    }
    .tab-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }

    input:not([type=number]):not([type=checkbox]):not([type=radio]):not([type=file]):not([type=range]):not(.no-pad-left) {
      padding-left: 14px !important;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 11px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      width: 100%;
      height: 44px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    textarea { height: auto; min-height: 44px; }
    input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }
    .money-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 11px 14px; font-family: 'Nunito', sans-serif; font-size: 14px; width: 100%; height: 44px; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
    .money-input:focus { border-color: var(--orange); }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    input:focus, select:focus { border-color: var(--orange); }
    select option { background: var(--surface2); }
    label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; display: block; }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
    }
    .btn-primary { background: var(--orange); color: white; }
    .btn-primary:hover { background: #e55a1f; transform: translateY(-1px); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid #FF4D6A44; }
    .btn-danger:hover { background: var(--red); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
    }
    .badge-orange { background: var(--orange-dim); color: var(--orange); }
    .badge-green { background: var(--green-dim); color: var(--green); }
    .badge-red { background: var(--red-dim); color: var(--red); }
    .badge-blue { background: var(--blue-dim); color: var(--blue); }
    .badge-yellow { background: var(--yellow-dim); color: var(--yellow); }

    table { width: 100%; border-collapse: collapse; }
    th { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #1E2330; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .neu { color: var(--muted); }

    .section-title {
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%; max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 28px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-track { background: transparent; }
    .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .order-sub-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .chip {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0 20px;
      height: 44px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }
    .chip.active { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
    .chip:hover:not(.active) { border-color: #3A4560; color: var(--text); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,106,0); border-color: #FF4D6A55; }
      50% { box-shadow: 0 0 0 6px rgba(255,77,106,0.12); border-color: #FF4D6Aaa; }
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--muted);
      transition: all 0.15s;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }
    .nav-item.active { background: var(--orange-dim); color: var(--orange); }
    .nav-item:hover:not(.active) { background: var(--surface2); color: var(--text); }

    .number-big {
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 500;
    }

    /* ── MOBILE STYLES ─────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      /* Layout: sidebar becomes bottom nav */
      .desktop-sidebar { display: none !important; }
      .mobile-bottomnav { display: flex !important; }
      .mobile-topbar { display: flex !important; }
      .main-content {
        padding: 16px 14px 90px !important;
        margin: 0 !important;
        max-width: 100% !important;
      }

      /* Wallet cards: 2 columns on mobile */
      .wallet-grid {
        grid-template-columns: 1fr 1fr !important;
        gap: 10px !important;
      }
      .stat-card {
        padding: 14px 14px !important;
      }
      .number-big {
        font-size: 16px !important;
      }

      /* Income stats: 2x2 grid */
      .income-grid {
        grid-template-columns: 1fr 1fr !important;
        gap: 10px !important;
      }

      /* Chart period selector */
      .chart-header {
        flex-direction: column !important;
        gap: 12px !important;
        align-items: flex-start !important;
      }
      .chart-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      /* Modal: full-screen bottom sheet on mobile */
      .modal-overlay {
        align-items: flex-end !important;
        padding: 0 !important;
      }
      .modal {
        border-radius: 20px 20px 0 0 !important;
        max-width: 100% !important;
        max-height: 92vh !important;
        padding: 20px 16px 32px !important;
      }

      /* Drag handle for modal */
      .modal::before {
        content: '';
        display: block;
        width: 40px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 0 auto 16px;
      }

      /* Sub order type chips: 2x2 grid */
      .sub-type-chips {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 6px !important;
      }
      .sub-type-chips .chip {
        padding: 0 8px !important;
        height: 40px !important;
        font-size: 12px !important;
        justify-content: center !important;
      }

      /* Order form grid: 1 col */
      .order-form-grid {
        grid-template-columns: 1fr !important;
      }

      /* History table: card style on mobile */
      .mobile-hide-col { display: none !important; }
      .mobile-card-row {
        display: block !important;
      }
      .desktop-table { display: none !important; }
      .mobile-list { display: block !important; }

      /* Quick actions FAB */
      .mobile-fab { display: flex !important; }

      /* History tabs: scrollable */
      .history-tabs {
        flex-wrap: nowrap !important;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
        padding-bottom: 4px !important;
        gap: 6px !important;
      }
      .history-tabs .tab-btn {
        white-space: nowrap !important;
        flex-shrink: 0 !important;
        padding: 8px 14px !important;
      }

      /* Transfer modal grid */
      .transfer-grid {
        grid-template-columns: 1fr 1fr !important;
      }

      /* Dashboard title */
      .dashboard-header h2 { font-size: 20px !important; }

      /* Section title spacing */
      .section-title { margin-bottom: 8px !important; }

      /* Tap targets */
      .btn { min-height: 44px; }
      .btn-sm { min-height: 36px; }
      input, select { height: 48px !important; font-size: 16px !important; } /* 16px prevents iOS zoom */
      .money-input { height: 48px !important; font-size: 16px !important; }

      /* Preview box in order modal */
      .preview-box {
        font-size: 12px !important;
      }

      /* Wallet setup modal */
      .wallet-setup-modal {
        max-width: 100% !important;
      }

      /* Cash modal */
      .cash-modal {
        max-width: 100% !important;
      }

      /* Tip modal */
      .tip-modal {
        max-width: 100% !important;
      }

      /* Transfer modal */
      .transfer-modal {
        max-width: 100% !important;
      }

      /* Backup modal */
      .backup-modal {
        max-width: 100% !important;
      }

      /* Login card */
      .login-card {
        border-radius: 20px 20px 0 0 !important;
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        max-width: 100% !important;
        padding: 28px 20px 40px !important;
      }
      .login-wrapper {
        align-items: flex-end !important;
        padding: 0 !important;
        background: var(--bg) !important;
      }
      .login-logo {
        position: fixed !important;
        top: 30% !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
      }
    }

    /* Desktop: hide mobile-only elements */
    .mobile-bottomnav { display: none; }
    .mobile-topbar { display: none; }
    .mobile-fab { display: none; }
    .mobile-list { display: none; }
    .desktop-table { display: block; }

    /* ── MOBILE BOTTOM NAV ─────────────────────────────────────────────── */
    .mobile-bottomnav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 50;
      padding: 8px 0 env(safe-area-inset-bottom, 8px);
      align-items: stretch;
    }

    /* ── MOBILE TOP BAR ────────────────────────────────────────────────── */
    .mobile-topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      align-items: center;
      justify-content: space-between;
    }

    /* ── MOBILE CARD LIST (History) ────────────────────────────────────── */
    .mobile-order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, LineChart, Line, CartesianGrid } = Recharts;

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = (n) => {
  const abs = Math.abs(n);
  const s = abs >= 1000 ? (abs/1000).toFixed(abs%1000===0?0:1)+'k' : abs.toString();
  return (n < 0 ? '-' : '') + s;
};
const fmtFull = (n) => new Intl.NumberFormat('vi-VN').format(n) + 'đ';
const today = () => new Date().toISOString().split('T')[0];
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);

// Detect mobile
const isMobile = () => window.innerWidth <= 768;

const INITIAL = {
  wallets: { app: 0, momo: 0, mb: 0, cash: 0 },
  orders: [],
  transfers: [],
  tipApp: [],
  cashTx: [],
};

// ── API ───────────────────────────────────────────────────────────────────────
const api = {
  async loadData(userId) {
    const r = await fetch(`/api/data?userId=${encodeURIComponent(userId)}`);
    if (!r.ok) throw new Error('Không tải được dữ liệu');
    return r.json();
  },
  async saveWallets(userId, wallets) {
    await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, action: 'saveWallets', data: { wallets } }) });
  },
  async addOrder(userId, order) {
    const r = await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, action: 'addOrder', data: order }) });
    if (!r.ok) throw new Error('Không thêm được order');
    return (await r.json())._id;
  },
  async updateOrder(userId, order) {
    await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, action: 'updateOrder', data: order }) });
  },
  async deleteOrder(userId, orderId) {
    await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, action: 'deleteOrder', data: { _id: orderId } }) });
  },
  async addTransfer(userId, transfer) {
    const r = await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, action: 'addTransfer', data: transfer }) });
    if (!r.ok) throw new Error('Không thêm được transfer');
    return (await r.json())._id;
  },
  async deleteTransfer(userId, transferId) {
    await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, action: 'deleteTransfer', data: { _id: transferId } }) });
  },
  async addTip(userId, tip) {
    const r = await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, action: 'addTip', data: tip }) });
    if (!r.ok) throw new Error('Không thêm được tip');
    return (await r.json())._id;
  },
  async addCash(userId, tx) {
    const r = await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, action: 'addCash', data: tx }) });
    if (!r.ok) throw new Error('Không thêm được giao dịch');
    return (await r.json())._id;
  },
  async deleteCash(userId, txId) {
    await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, action: 'deleteCash', data: { _id: txId } }) });
  },
  async saveAll(userId, data) {
    await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, action: 'saveAll', data }) });
  },
  async auth(username, action) {
    const r = await fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, action }) });
    return { ok: r.ok, data: await r.json() };
  },
};

// Icons
const Icon = ({ name, size=16 }) => {
  const icons = {
    dashboard: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
    order: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>,
    transfer: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>,
    chart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>,
    tip: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>,
    wallet: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 14a1 1 0 100-2 1 1 0 000 2z" fill="currentColor"/><path d="M16 7V5a2 2 0 00-2-2H6a2 2 0 00-2 2v2"/></svg>,
    close: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    ship: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>,
    menu: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
    cash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M6 12h.01M18 12h.01"/></svg>,
  };
  return icons[name] || null;
};

// ── WalletCard ────────────────────────────────────────────────────────────────
const WalletCard = ({ label, value, color, icon, warnNegative }) => {
  const isNeg = warnNegative && value < 0;
  return (

// ── MoneyInput ────────────────────────────────────────────────────────────────
const MoneyInput = ({ value, onChange, placeholder, style, className }) => {
  const [display, setDisplay] = React.useState(value ? Number(value).toLocaleString('vi-VN') : '');

  React.useEffect(() => {
    if (!value && value !== 0) { setDisplay(''); return; }
    const num = Number(value);
    if (!isNaN(num)) setDisplay(num === 0 ? '' : num.toLocaleString('vi-VN'));
  }, [value]);

  const handleChange = (e) => {
    const raw = e.target.value.replace(/\./g, '').replace(/[^0-9]/g, '');
    const num = raw === '' ? 0 : parseInt(raw, 10);
    setDisplay(raw === '' ? '' : num.toLocaleString('vi-VN'));
    onChange(num);
  };

  return (
    <input
      type="text"
      inputMode="numeric"
      value={display}
      onChange={handleChange}
      placeholder={placeholder || '0'}
      style={style}
      className={className || 'money-input'}
    />
  );
};

// ── Order Modal ───────────────────────────────────────────────────────────────
const OrderModal = ({ onClose, onSave, initialData }) => {
  const isEdit = !!initialData;
  const [isBundle, setIsBundle] = useState(initialData?.isBundle || false);
  const [date, setDate] = useState(initialData?.date || today());
  const [shipTotal, setShipTotal] = useState(initialData?.shipTotal || '');
  const [note, setNote] = useState(initialData?.note || '');
  const [tipAppAmount, setTipAppAmount] = useState(initialData?.tipApp || '');
  const [subOrders, setSubOrders] = useState(initialData?.subOrders || [{ id:genId(), type:'1', payShop:0, payShopMethod:'cash', collectCustomer:0, collectMethod:'cash', refund:0, refundMethod:'cash' }]);

  const addSub = () => setSubOrders(p=>[...p,{ id:genId(), type:'1', payShop:0, payShopMethod:'cash', collectCustomer:0, collectMethod:'cash', refund:0, refundMethod:'cash' }]);
  const updateSub = (i,v) => setSubOrders(p=>p.map((x,idx)=>idx===i?v:x));
  const removeSub = (i) => setSubOrders(p=>p.filter((_,idx)=>idx!==i));

  const ship = +shipTotal || 0;
  const totalChenhLech = subOrders.reduce((acc,s) => {
    if(s.type==='2') return acc + (s.orderAmount||0);
    if(s.type==='3') return acc + (s.orderAmount||0) - (s.payShop||0);
    if(s.type==='4') return acc - (s.payShop||0);
    return acc;
  }, 0);
  const appDelta = ship - totalChenhLech + (+tipAppAmount||0);

  const handleSave = () => {
    if(!ship) { alert('Nhập tiền ship đi bạn!'); return; }
    const order = {
      ...(initialData?._id ? { _id: initialData._id } : {}),
      date, isBundle, shipTotal:ship, note, tipApp:+tipAppAmount||0, subOrders
    };
    onSave(order);
    onClose();
  };

  return (
    <div className="modal-overlay">
      <div className="modal fade-in">
        <div className="flex justify-between items-center mb-5">
          <h2 style={{fontSize:18}}>
            <Icon name="order" size={18}/>&nbsp; {isEdit ? 'Sửa đơn' : 'Nhập đơn mới'}
          </h2>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><Icon name="close" size={16}/></button>
        </div>

        {/* Date + Bundle toggle */}
        <div className="grid gap-3 mb-4" style={{gridTemplateColumns:'1fr 1fr'}}>
          <div>
            <label>Ngày</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} />
          </div>
          <div>
            <label>Loại đơn</label>
            <div className="flex gap-2 mt-1">
              <button className={`chip ${!isBundle?'active':''}`} style={{flex:1,height:48,fontSize:13}} onClick={()=>{setIsBundle(false);setSubOrders(s=>s.slice(0,1))}}>Lẻ</button>
              <button className={`chip ${isBundle?'active':''}`} style={{flex:1,height:48,fontSize:13}} onClick={()=>setIsBundle(true)}>Ghép</button>
            </div>
          </div>
        </div>

        {/* Ship + Tip */}
        <div className="grid gap-3 mb-4" style={{gridTemplateColumns:'1fr 1fr'}}>
          <div>
            <label>Tiền ship {isBundle?'(cả chùm)':''}(đ) *</label>
            <MoneyInput value={+shipTotal||0} onChange={v=>setShipTotal(v)} placeholder="VD: 25000" />
          </div>
          <div>
            <label>Tip app (nếu có)</label>
            <MoneyInput value={+tipAppAmount||0} onChange={v=>setTipAppAmount(v)} placeholder="0" />
          </div>
        </div>

        <div className="section-title mb-2">Chi tiết {isBundle?'từng đơn':'đơn'}</div>
        {subOrders.map((s,i)=>(
          <SubOrderForm key={s.id} index={i} data={s} onChange={v=>updateSub(i,v)} onRemove={()=>removeSub(i)} canRemove={subOrders.length>1} />
        ))}
        {isBundle && (
          <button className="btn btn-ghost btn-sm mb-4" onClick={addSub} style={{width:'100%',minHeight:44}}>
            <Icon name="plus" size={14}/> Thêm đơn con
          </button>
        )}

        <div className="mb-4">
          <label>Ghi chú</label>
          <input placeholder="VD: khu vực xa, khách dễ tính..." value={note} onChange={e=>setNote(e.target.value)} />
        </div>

        {/* Preview */}
        <div className="preview-box p-3 rounded-xl mb-5" style={{background:'var(--bg)',border:'1px solid var(--border)'}}>
          <div className="section-title mb-2">Xem trước tác động</div>
          <div className="grid gap-2">
            <div className="flex justify-between"><span style={{fontSize:13,color:'var(--muted)'}}>Ví App thay đổi</span><span className="mono" style={{fontSize:13,color:appDelta>=0?'var(--green)':'var(--red)'}}>{appDelta>=0?'+':''}{fmtFull(appDelta)}</span></div>
            {subOrders.map((s,i)=>{
              const tipPhy = (s.collectCustomer||0) - (s.orderAmount||0) - (s.refund||0);
              const cashDelta = (s.collectMethod==='cash'?(s.collectCustomer||0):0) - (s.payShopMethod==='cash'?(s.payShop||0):0) - (s.refundMethod==='cash'?(s.refund||0):0);
              const mbDelta = (s.collectMethod==='mb'?(s.collectCustomer||0):0) - (s.payShopMethod==='mb'?(s.payShop||0):0);
              const momoDelta = -(s.payShopMethod==='momo'?(s.payShop||0):0) - (s.refundMethod==='momo'?(s.refund||0):0);
              return (
                <React.Fragment key={i}>
                  {cashDelta!==0 && <div className="flex justify-between"><span style={{fontSize:12,color:'var(--muted)'}}>Tiền mặt {isBundle?`(đơn #${i+1})`:''}</span><span className="mono" style={{fontSize:12,color:cashDelta>0?'var(--green)':'var(--red)'}}>{cashDelta>0?'+':''}{fmtFull(cashDelta)}</span></div>}
                  {mbDelta!==0 && <div className="flex justify-between"><span style={{fontSize:12,color:'var(--muted)'}}>MB Bank {isBundle?`(đơn #${i+1})`:''}</span><span className="mono" style={{fontSize:12,color:mbDelta>0?'var(--green)':'var(--red)'}}>{mbDelta>0?'+':''}{fmtFull(mbDelta)}</span></div>}
                  {momoDelta!==0 && <div className="flex justify-between"><span style={{fontSize:12,color:'var(--muted)'}}>Momo {isBundle?`(đơn #${i+1})`:''}</span><span className="mono" style={{fontSize:12,color:'var(--red)'}}>{fmtFull(momoDelta)}</span></div>}
                  {tipPhy>0 && <div className="flex justify-between"><span style={{fontSize:12,color:'var(--muted)'}}>Tip vật lý {isBundle?`(đơn #${i+1})`:''}</span><span className="mono" style={{fontSize:12,color:'var(--yellow)'}}>+{fmtFull(tipPhy)}</span></div>}
                </React.Fragment>
              );
            })}
          </div>
        </div>

        <div className="flex gap-3">
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Huỷ</button>
          <button className="btn btn-primary" style={{flex:2,minHeight:48}} onClick={handleSave}>{isEdit ? 'Cập nhật đơn' : 'Lưu đơn'}</button>
        </div>
      </div>
    </div>
  );
};

// ── Login Screen ──────────────────────────────────────────────────────────────
const LoginScreen = ({ onLogin }) => {
  const [username, setUsername] = React.useState('');
  const [mode, setMode] = React.useState('login');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');

  const handle = async () => {
    const clean = username.trim();
    if (!clean) return;
    setLoading(true); setError('');
    const { ok, data } = await api.auth(clean, mode);
    setLoading(false);
    if (!ok) { setError(data.error || 'Lỗi không xác định'); return; }
    onLogin(data.userId, data.username);
  };

  return (
    <div className="login-wrapper" style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:16}}>
      <div className="login-card fade-in" style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,padding:'36px 32px',width:'100%',maxWidth:380}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:32,color:'var(--orange)',letterSpacing:'-0.02em',marginBottom:6}}>ShipFlow</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>Quản lý dòng tiền Shopee Food</div>
        </div>
        <div style={{display:'flex',gap:4,marginBottom:20,background:'var(--bg)',padding:4,borderRadius:10}}>
          <button className={`tab-btn ${mode==='login'?'active':''}`} style={{flex:1,minHeight:44}} onClick={()=>{setMode('login');setError('');}}>Đăng nhập</button>
          <button className={`tab-btn ${mode==='register'?'active':''}`} style={{flex:1,minHeight:44}} onClick={()=>{setMode('register');setError('');}}>Đăng ký</button>
        </div>
        <div style={{marginBottom:16}}>
          <label>Tên đăng nhập</label>
          <input type="text" placeholder="VD: mahiru, ship_rider_01" value={username}

          {loading ? '⏳ Đang xử lý...' : mode==='login' ? '🚀 Đăng nhập' : '✨ Đăng ký'}

// ── Chart Page ────────────────────────────────────────────────────────────────
const ChartPage = ({ data }) => {
  const [period, setPeriod] = useState('day');
  const { orders } = data;

  const chartData = useMemo(() => {
    const groups = {};
    orders.forEach(o => {
      let key = o.date;
      if(period==='week') {
        const d = new Date(o.date);
        const wk = Math.ceil(d.getDate()/7);
        key = `${o.date.slice(0,7)}-W${wk}`;
      } else if(period==='month') {
        key = o.date.slice(0,7);
      } else if(period==='year') {
        key = o.date.slice(0,4);
      }
      if(!groups[key]) groups[key] = { key, ship:0, tip:0, total:0, orders:0 };
      const tipPhy = o.subOrders.reduce((a,s)=>a+Math.max(0,(s.collectCustomer||0)-(s.orderAmount||0)-(s.refund||0)),0);
      groups[key].ship += o.shipTotal;
      groups[key].tip += tipPhy + (o.tipApp||0);
      groups[key].total += o.shipTotal + tipPhy + (o.tipApp||0);
      groups[key].orders += 1;
    });
    return Object.values(groups).sort((a,b)=>a.key.localeCompare(b.key));
  }, [orders, period]);

  return (
    <div className="fade-in">
      <div className="mb-5 chart-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <h2 style={{fontSize:22,marginBottom:2}}>Biểu đồ thu nhập</h2>
          <p style={{color:'var(--muted)',fontSize:13}}>Theo thời gian</p>
        </div>
        <div className="chart-tabs" style={{display:'flex',gap:4}}>
          {[['day','Ngày'],['week','Tuần'],['month','Tháng'],['year','Năm']].map(([v,l])=>(
            <button key={v} className={`tab-btn ${period===v?'active':''}`} onClick={()=>setPeriod(v)}>{l}</button>
          ))}
        </div>
      </div>

      {chartData.length === 0 ? (
        <div className="card" style={{padding:48,textAlign:'center',color:'var(--muted)'}}>Chưa có dữ liệu</div>
      ) : (
        <>
          <div className="card p-5 mb-4">
            <div className="section-title mb-4">Công ship + Tip</div>
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={chartData} barGap={4}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2A3040" />
                <XAxis dataKey="key" tick={{fill:'#6B7A99',fontSize:10}} axisLine={false} tickLine={false} />
                <YAxis tick={{fill:'#6B7A99',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>fmt(v)} />
                <Tooltip contentStyle={{background:'#1E2330',border:'1px solid #2A3040',borderRadius:10,fontFamily:'Nunito'}} labelStyle={{color:'#E8ECF4',marginBottom:4}} formatter={(v,n)=>[fmtFull(v), n==='ship'?'Công ship':'Tip']} />
                <Bar dataKey="ship" fill="#FF6B2B" radius={[4,4,0,0]} />
                <Bar dataKey="tip" fill="#FFD166" radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="card p-5">
            <div className="section-title mb-4">Tổng thu nhập</div>
            <ResponsiveContainer width="100%" height={200}>
              <LineChart data={chartData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2A3040" />
                <XAxis dataKey="key" tick={{fill:'#6B7A99',fontSize:10}} axisLine={false} tickLine={false} />
                <YAxis tick={{fill:'#6B7A99',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>fmt(v)} />
                <Tooltip contentStyle={{background:'#1E2330',border:'1px solid #2A3040',borderRadius:10,fontFamily:'Nunito'}} formatter={(v)=>[fmtFull(v),'Thu nhập']} />
                <Line type="monotone" dataKey="total" stroke="#00E5A0" strokeWidth={2.5} dot={{fill:'#00E5A0',r:4}} />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </>
      )}

  );

                <tr><th>Ngày</th><th>Loại</th><th>Ship</th><th>Tip vật lý</th><th>Ví App Δ</th><th>Cash Δ</th><th>MB Δ</th><th>Ghi chú</th><th></th></tr>
              </thead>
              <tbody>
                {orders.length===0 && <tr><td colSpan={9} style={{textAlign:'center',color:'var(--muted)',padding:32}}>Chưa có đơn nào</td></tr>}

                  const tipPhy = o.subOrders.reduce((a,s)=>a+Math.max(0,(s.collectCustomer||0)-(s.orderAmount||0)-(s.refund||0)),0);
                  const chenhLech = o.subOrders.reduce((a,s)=>{
                    if(s.type==='2') return a+(s.orderAmount||0);
                    if(s.type==='3') return a+(s.orderAmount||0)-(s.payShop||0);
                    return a;
                  },0);
                  const appDelta = o.shipTotal - chenhLech + (o.tipApp||0);
                  const cashDelta = o.subOrders.reduce((a,s)=>{
                    let d=0;
                    if(s.collectMethod==='cash') d+=(s.collectCustomer||0);
                    if(s.payShopMethod==='cash') d-=(s.payShop||0);
                    if(s.refundMethod==='cash') d-=(s.refund||0);
                    return a+d;
                  },0);
                  const mbDelta = o.subOrders.reduce((a,s)=>a+(s.collectMethod==='mb'?(s.collectCustomer||0):0),0);
                  return (
                    <tr key={o._id}>
                      <td className="mono" style={{fontSize:12}}>{o.date}</td>
                      <td><span className={`badge ${o.isBundle?'badge-blue':'badge-orange'}`}>{o.isBundle?`Ghép(${o.subOrders.length})`:'Lẻ'}</span></td>

                      <td className="mono" style={{color:appDelta>=0?'var(--green)':'var(--red)'}}>{appDelta>=0?'+':''}{fmt(appDelta)}</td>
                      <td className="mono" style={{color:cashDelta>=0?'var(--green)':'var(--red)'}}>{cashDelta!==0?(cashDelta>0?'+':'')+fmt(cashDelta):'-'}</td>
                      <td className="mono" style={{color:'var(--blue)'}}>{mbDelta>0?'+'+fmt(mbDelta):'-'}</td>
                      <td style={{color:'var(--muted)',fontSize:12}}>{o.note||'-'}</td>
                      <td style={{display:'flex',gap:4}}>

                      </td>

                  );

        <>

            <table>

          <div className="mobile-list">
            {tipApp.length===0 && (
              <div style={{textAlign:'center',color:'var(--muted)',padding:32,background:'var(--surface)',borderRadius:14,border:'1px solid var(--border)'}}>Chưa có tip app</div>
            )}
            {[...tipApp].reverse().map(t=>(
              <div key={t._id} className="mobile-order-card flex justify-between items-center">
                <span style={{fontSize:12,color:'var(--muted)'}}>{t.date}</span>
                <span className="mono pos" style={{fontWeight:700}}>+{fmtFull(t.amount)}</span>
              </div>

      )}

      {tab==='cashtx' && (
        <>
          <div className="desktop-table card">
            <table>
              <thead><tr><th>Ngày</th><th>Loại</th><th>Ví</th><th>Số tiền</th><th>Ghi chú</th><th></th></tr></thead>

// ── Backup Modal ──────────────────────────────────────────────────────────────
const BackupModal = ({ data, onClose, onRestore }) => {
  const [tab, setTab] = useState('export');
  const [importText, setImportText] = useState('');
  const [importMode, setImportMode] = useState('merge');
  const [importResult, setImportResult] = useState(null);
  const [dragOver, setDragOver] = useState(false);

  const exportJSON = () => {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `shipflow_backup_${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const exportCSV = () => {
    const rows = [['TYPE','id','date','isBundle','shipTotal','tipApp','note','sub_index','sub_type','sub_payShop','sub_payShopMethod','sub_collectCustomer','sub_collectMethod','sub_refund','sub_refundMethod']];
    data.orders.forEach(o => {
      o.subOrders.forEach((s, i) => {
        rows.push(['ORDER', o._id, o.date, o.isBundle?1:0, o.shipTotal, o.tipApp||0, o.note||'', i, s.type, s.payShop||0, s.payShopMethod||'cash', s.collectCustomer||0, s.collectMethod||'cash', s.refund||0, s.refundMethod||'cash']);
      });
    });
    rows.push(['---']);
    rows.push(['TYPE','id','date','from','to','amount','note']);
    data.transfers.forEach(t => { rows.push(['TRANSFER', t._id, t.date, t.from, t.to, t.amount, t.note||'']); });
    rows.push(['---']);
    rows.push(['TYPE','id','date','amount']);
    data.tipApp.forEach(t => { rows.push(['TIPAPP', t._id, t.date, t.amount]); });
    rows.push(['---']);
    rows.push(['TYPE','app','cash','mb','momo']);
    rows.push(['WALLETS', data.wallets.app, data.wallets.cash, data.wallets.mb, data.wallets.momo]);
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `shipflow_backup_${today()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const parseAndImport = (text) => {
    setImportResult(null);
    try {
      let parsed = null;
      const trimmed = text.trim();
      if (trimmed.startsWith('{')) {
        parsed = JSON.parse(trimmed);
        if (!parsed.wallets || !parsed.orders) throw new Error('File JSON không đúng định dạng ShipFlow');
      } else {
        const lines = trimmed.split('\n').map(l => l.trim()).filter(Boolean);
        const orders = [], transfers = [], tipApp = [];
        let wallets = null, orderMap = {};
        lines.forEach(line => {
          if (line.startsWith('---') || line.startsWith('TYPE')) return;
          const cols = line.split(',');
          const type = cols[0];
          if (type === 'ORDER') {
            const [,id,date,isBundle,shipTotal,tipAppAmt,note,subIdx,subType,payShop,payShopMethod,collectCustomer,collectMethod,refund,refundMethod] = cols;
            if (!orderMap[id]) { orderMap[id] = { date, isBundle:isBundle==='1', shipTotal:+shipTotal, tipApp:+tipAppAmt, note, subOrders:[] }; orders.push(orderMap[id]); }
            orderMap[id].subOrders.push({ type:subType, payShop:+payShop, payShopMethod, collectCustomer:+collectCustomer, collectMethod, refund:+refund, refundMethod });
          } else if (type === 'TRANSFER') {
            const [,id,date,from,to,amount,note] = cols;
            transfers.push({ date, from, to, amount:+amount, note });
          } else if (type === 'TIPAPP') {
            const [,id,date,amount] = cols;
            tipApp.push({ date, amount:+amount });
          } else if (type === 'WALLETS') {
            wallets = { app:+cols[1], cash:+cols[2], mb:+cols[3], momo:+cols[4] };
          }
        });
        parsed = { orders, transfers, tipApp, wallets: wallets || { app:0, cash:0, mb:0, momo:0 } };
      }
      if (importMode === 'overwrite') {
        onRestore(parsed);
        setImportResult({ ok:true, msg:`✅ Ghi đè thành công! ${parsed.orders.length} đơn.` });
      } else {
        const existOrderIds = new Set(data.orders.map(o=>o._id).filter(Boolean));
        const existTransIds = new Set(data.transfers.map(t=>t._id).filter(Boolean));
        const existTipIds   = new Set(data.tipApp.map(t=>t._id).filter(Boolean));
        const newOrders = parsed.orders.filter(o=>!o._id || !existOrderIds.has(o._id));
        const newTrans  = parsed.transfers.filter(t=>!t._id || !existTransIds.has(t._id));
        const newTip    = parsed.tipApp.filter(t=>!t._id || !existTipIds.has(t._id));
        const w = {...data.wallets};
        newOrders.forEach(order => {
          const cl = order.subOrders.reduce((a,s)=>{ if(s.type==='2') return a+(s.orderAmount||0); if(s.type==='3') return a+(s.orderAmount||0)-(s.payShop||0); return a; },0);
          w.app += order.shipTotal - cl + (order.tipApp||0);
          order.subOrders.forEach(s=>{
            if(s.collectMethod==='cash') w.cash += (s.collectCustomer||0);
            if(s.collectMethod==='mb')   w.mb   += (s.collectCustomer||0);
            if(s.payShopMethod==='cash') w.cash -= (s.payShop||0);
            if(s.payShopMethod==='momo') w.momo -= (s.payShop||0);
            if(s.refundMethod==='cash')  w.cash -= (s.refund||0);
            if(s.refundMethod==='momo')  w.momo -= (s.refund||0);
          });
        });
        newTrans.forEach(t=>{ w[t.from]-=t.amount; w[t.to]+=t.amount; });
        newTip.forEach(t=>{ w.app+=t.amount; });
        const merged = { wallets: w, orders:[...data.orders,...newOrders], transfers:[...data.transfers,...newTrans], tipApp:[...data.tipApp,...newTip] };
        setImportResult({ ok:true, msg:`✅ Gộp thành công! Thêm ${newOrders.length} đơn mới.` });
        onRestore(merged);
      }
    } catch(e) {
      setImportResult({ ok:false, msg:'❌ Lỗi: ' + e.message });
    }
  };

  const handleFile = (file) => {
    const reader = new FileReader();
    reader.onload = e => { setImportText(e.target.result); };
    reader.readAsText(file, 'utf-8');
  };

  return (
    <div className="modal-overlay">
      <div className="modal backup-modal fade-in" style={{maxWidth:560}}>
        <div className="flex justify-between items-center mb-5">
          <h2 style={{fontSize:18}}>💾 Backup & Restore</h2>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><Icon name="close" size={16}/></button>
        </div>
        <div className="flex gap-1 mb-5">
          <button className={`tab-btn ${tab==='export'?'active':''}`} onClick={()=>setTab('export')}>📤 Xuất dữ liệu</button>
          <button className={`tab-btn ${tab==='import'?'active':''}`} onClick={()=>setTab('import')}>📥 Nhập dữ liệu</button>
        </div>
        {tab==='export' && (
          <div>
            <p style={{fontSize:13,color:'var(--muted)',marginBottom:20,lineHeight:1.6}}>
              Xuất toàn bộ dữ liệu ra file để backup hoặc chuyển sang máy khác.<br/>
              <strong style={{color:'var(--text)'}}>JSON</strong> — đầy đủ, dùng để restore lại chính xác 100%.<br/>
              <strong style={{color:'var(--text)'}}>CSV</strong> — mở được bằng Excel để xem/phân tích.
            </p>
            <div className="grid gap-3" style={{gridTemplateColumns:'1fr 1fr'}}>
              <button className="btn btn-primary" style={{padding:'14px',fontSize:15,minHeight:52}} onClick={exportJSON}>📄 Xuất JSON</button>
              <button className="btn btn-ghost" style={{padding:'14px',fontSize:15,minHeight:52}} onClick={exportCSV}>📊 Xuất CSV</button>
            </div>
            <div className="mt-4 p-3 rounded-xl" style={{background:'var(--bg)',border:'1px solid var(--border)',fontSize:12,color:'var(--muted)'}}>
              📦 {data.orders.length} đơn · {data.transfers.length} chuyển tiền · {data.tipApp.length} tip app
            </div>
          </div>
        )}
        {tab==='import' && (
          <div>
            <div className="mb-4">
              <div className="section-title mb-2">Chế độ nhập</div>
              <div className="flex gap-2">
                <button className={`chip ${importMode==='merge'?'active':''}`} style={{flex:1,height:44}} onClick={()=>setImportMode('merge')}>🔀 Gộp</button>
                <button className={`chip ${importMode==='overwrite'?'active':''}`} style={{flex:1,height:44,...(importMode==='overwrite'?{borderColor:'var(--red)',color:'var(--red)',background:'var(--red-dim)'}:{})}} onClick={()=>setImportMode('overwrite')}>⚠️ Ghi đè</button>
              </div>
            </div>
            <div
              onDragOver={e=>{e.preventDefault();setDragOver(true)}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)handleFile(f);}}
              style={{border:`2px dashed ${dragOver?'var(--orange)':'var(--border)'}`,borderRadius:12,padding:'20px 16px',textAlign:'center',background:dragOver?'var(--orange-dim)':'var(--bg)',cursor:'pointer',marginBottom:12,transition:'all 0.2s'}}
              onClick={()=>document.getElementById('file-input').click()}
            >
              <div style={{fontSize:28,marginBottom:6}}>📂</div>
              <div style={{fontSize:13,color:'var(--muted)'}}>Chọn file hoặc kéo thả</div>
              <input id="file-input" type="file" accept=".json,.csv,.txt" style={{display:'none'}} onChange={e=>{ if(e.target.files[0]) handleFile(e.target.files[0]); }} />
            </div>
            <div className="mb-3">
              <label>Hoặc dán nội dung file</label>
              <textarea rows={4} placeholder='Dán nội dung file JSON hoặc CSV...' value={importText} onChange={e=>setImportText(e.target.value)} style={{resize:'vertical',fontFamily:'Nunito',fontSize:11}} />
            </div>
            {importResult && (
              <div className="mb-3 p-3 rounded-xl" style={{background:importResult.ok?'var(--green-dim)':'var(--red-dim)',border:`1px solid ${importResult.ok?'var(--green)':'var(--red)'}44`,fontSize:12,color:importResult.ok?'var(--green)':'var(--red)'}}>
                {importResult.msg}
              </div>
            )}
            <div className="flex gap-3">
              <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Đóng</button>
              <button className="btn btn-primary" style={{flex:2,minHeight:48,background:importMode==='overwrite'?'var(--red)':undefined}} onClick={()=>parseAndImport(importText)} disabled={!importText.trim()}>
                {importMode==='merge' ? '🔀 Gộp' : '⚠️ Ghi đè'}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Pure wallet-delta helpers ─────────────────────────────────────────────────
const calcChenhLech = (subOrders) => subOrders.reduce((a,s)=>{
  if(s.forgotCollect) {
    if(s.type==='2') return a+(s.orderAmount||0);
    if(s.type==='3') return a+(s.orderAmount||0)-(s.payShop||0);
    return a;
  }
  if(s.type==='2') return a+(s.orderAmount||0);
  if(s.type==='3') return a+(s.orderAmount||0)-(s.payShop||0);
  if(s.type==='4') return a-(s.payShop||0);
  return a;
},0);

const applySubWallet = (w, s, sign=1) => {
  if(!s.forgotCollect) {
    if(s.collectMethod==='cash') w.cash += sign*(s.collectCustomer||0);
    if(s.collectMethod==='mb')   w.mb   += sign*(s.collectCustomer||0);
    if(s.refundMethod==='cash')  w.cash -= sign*(s.refund||0);
    if(s.refundMethod==='momo')  w.momo -= sign*(s.refund||0);
  }
  if(s.payShopMethod==='cash') w.cash -= sign*(s.payShop||0);
  if(s.payShopMethod==='momo') w.momo -= sign*(s.payShop||0);
  if(s.payShopMethod==='mb')   w.mb   -= sign*(s.payShop||0);
};

// ── App ───────────────────────────────────────────────────────────────────────
const App = () => {
  const [userId,   setUserId]   = useState(() => localStorage.getItem('spf_userId') || null);
  const [username, setUsername] = useState(() => localStorage.getItem('spf_user')   || null);
  const [page, setPage] = useState('dashboard');
  const [modal, setModal] = useState(null);
  const [editingOrder, setEditingOrder] = useState(null);
  const [showBackup, setShowBackup] = useState(false);
  const [showMobileMenu, setShowMobileMenu] = useState(false);
  const [data, setData] = useState(INITIAL);
  const [saving, setSaving] = useState(false);
  const [loadingData, setLoadingData] = useState(false);

  useEffect(() => {
    if (!userId) return;
    setLoadingData(true);
    api.loadData(userId)
      .then(d => setData(d))
      .catch(e => console.error('Load error:', e))
      .finally(() => setLoadingData(false));
  }, [userId]);

  const handleLogin = (newUserId, newUsername) => {
    localStorage.setItem('spf_userId', newUserId);
    localStorage.setItem('spf_user', newUsername);
    setUserId(newUserId);
    setUsername(newUsername);
  };

  const handleLogout = () => {
    localStorage.removeItem('spf_userId');
    localStorage.removeItem('spf_user');
    setUserId(null);
    setUsername(null);
    setData(INITIAL);
    setPage('dashboard');
  };

  const applyOrder = useCallback(async (order) => {
    const isEdit = !!order._id;
    setData(prev => {
      const w = {...prev.wallets};
      let orders = prev.orders;
      if (isEdit) {
        const existing = prev.orders.find(o => o._id === order._id);
        if (existing) {
          w.app -= existing.shipTotal - calcChenhLech(existing.subOrders) + (existing.tipApp||0);
          existing.subOrders.forEach(s => applySubWallet(w, s, -1));
          orders = prev.orders.map(o => o._id === order._id ? order : o);
        }
      } else {
        orders = [...prev.orders, order];
      }
      w.app += order.shipTotal - calcChenhLech(order.subOrders) + (order.tipApp||0);
      order.subOrders.forEach(s => applySubWallet(w, s, 1));
      return { ...prev, wallets: w, orders };
    });
    setSaving(true);
    try {
      if (isEdit) {
        await api.updateOrder(userId, order);
      } else {
        const newId = await api.addOrder(userId, order);
        setData(prev => ({ ...prev, orders: prev.orders.map(o => o === order || (!o._id && o.date === order.date && o.shipTotal === order.shipTotal) ? { ...o, _id: newId } : o) }));
      }
      setData(prev => { api.saveWallets(userId, prev.wallets).catch(console.error); return prev; });
    } catch(e) { console.error('Save order error:', e); }
    finally { setSaving(false); }
  }, [userId]);

  const applyTransfer = useCallback(async (t) => {
    setData(prev => {
      const w = {...prev.wallets};
      w[t.from] -= t.amount; w[t.to] += t.amount;
      return { ...prev, wallets: w, transfers: [...prev.transfers, t] };
    });
    setSaving(true);
    try {
      const newId = await api.addTransfer(userId, t);
      setData(prev => ({ ...prev, transfers: prev.transfers.map(x => !x._id && x.date === t.date && x.amount === t.amount ? { ...x, _id: newId } : x) }));
      setData(prev => { api.saveWallets(userId, prev.wallets).catch(console.error); return prev; });
    } catch(e) { console.error('Save transfer error:', e); }
    finally { setSaving(false); }
  }, [userId]);

  const applyTipApp = useCallback(async (t) => {
    setData(prev => {
      const w = {...prev.wallets};
      w.app += t.amount;
      return { ...prev, wallets: w, tipApp: [...prev.tipApp, t] };
    });
    setSaving(true);
    try {
      const newId = await api.addTip(userId, t);
      setData(prev => ({ ...prev, tipApp: prev.tipApp.map(x => !x._id && x.date === t.date && x.amount === t.amount ? { ...x, _id: newId } : x) }));
      setData(prev => { api.saveWallets(userId, prev.wallets).catch(console.error); return prev; });
    } catch(e) { console.error('Save tip error:', e); }
    finally { setSaving(false); }
  }, [userId]);

  const deleteOrder = useCallback(async (id) => {
    if(!confirm('Xoá đơn này? Số dư ví sẽ được hoàn lại.')) return;
    setData(prev => {
      const order = prev.orders.find(o=>o._id===id);
      if(!order) return prev;
      const w = {...prev.wallets};
      w.app -= order.shipTotal - calcChenhLech(order.subOrders) + (order.tipApp||0);
      order.subOrders.forEach(s => applySubWallet(w, s, -1));
      return { ...prev, wallets: w, orders: prev.orders.filter(o=>o._id!==id) };
    });
    setSaving(true);
    try {
      await api.deleteOrder(userId, id);
      setData(prev => { api.saveWallets(userId, prev.wallets).catch(console.error); return prev; });
    } catch(e) { console.error('Delete order error:', e); }
    finally { setSaving(false); }
  }, [userId]);

  const deleteTransfer = useCallback(async (id) => {
    if(!confirm('Xoá giao dịch chuyển tiền này?')) return;
    setData(prev => {
      const t = prev.transfers.find(x=>x._id===id);
      if(!t) return prev;
      const w = {...prev.wallets};
      w[t.from] += t.amount; w[t.to] -= t.amount;
      return { ...prev, wallets: w, transfers: prev.transfers.filter(x=>x._id!==id) };
    });
    setSaving(true);
    try {
      await api.deleteTransfer(userId, id);
      setData(prev => { api.saveWallets(userId, prev.wallets).catch(console.error); return prev; });
    } catch(e) { console.error('Delete transfer error:', e); }
    finally { setSaving(false); }
  }, [userId]);

  const applyCash = useCallback(async (tx) => {
    setData(prev => {
      const w = {...prev.wallets};
      if (tx.txType === 'deposit') w[tx.wallet] += tx.amount;
      else w[tx.wallet] -= tx.amount;
      return { ...prev, wallets: w, cashTx: [...(prev.cashTx||[]), tx] };
    });
    setSaving(true);
    try {
      const newId = await api.addCash(userId, tx);
      setData(prev => ({ ...prev, cashTx: (prev.cashTx||[]).map(x => !x._id && x.date===tx.date && x.amount===tx.amount && x.wallet===tx.wallet ? {...x,_id:newId} : x) }));
      setData(prev => { api.saveWallets(userId, prev.wallets).catch(console.error); return prev; });
    } catch(e) { console.error('Save cash error:', e); }
    finally { setSaving(false); }
  }, [userId]);

  const deleteCash = useCallback(async (id) => {
    if(!confirm('Xoá giao dịch này? Số dư ví sẽ được hoàn lại.')) return;
    setData(prev => {
      const tx = (prev.cashTx||[]).find(x=>x._id===id);
      if(!tx) return prev;
      const w = {...prev.wallets};
      if (tx.txType === 'deposit') w[tx.wallet] -= tx.amount;
      else w[tx.wallet] += tx.amount;
      return { ...prev, wallets: w, cashTx: (prev.cashTx||[]).filter(x=>x._id!==id) };
    });
    setSaving(true);
    try {
      await api.deleteCash(userId, id);
      setData(prev => { api.saveWallets(userId, prev.wallets).catch(console.error); return prev; });
    } catch(e) { console.error('Delete cash error:', e); }
    finally { setSaving(false); }
  }, [userId]);

  const editOrder = useCallback((order) => {
    setEditingOrder(order);
    setModal('order');
  }, []);

  const handleMobileAction = (action) => {
    if (action === 'backup') { setShowBackup(true); return; }
    if (action === 'logout') { handleLogout(); return; }
    setModal(action);
  };

  if (!userId) return <LoginScreen onLogin={handleLogin} />;

  if (loadingData) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
      <div style={{fontSize:28}}>⏳</div>
      <div style={{fontFamily:'Nunito',fontSize:16,color:'var(--muted)'}}>Đang tải dữ liệu...</div>
    </div>
  );

  const navPages = [
    { id:'dashboard', label:'Tổng quan', icon:'dashboard', emoji:'🏠' },
    { id:'chart', label:'Biểu đồ', icon:'chart', emoji:'📊' },
    { id:'history', label:'Lịch sử', icon:'order', emoji:'📋' },
  ];

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* Desktop Sidebar */}
      <aside className="desktop-sidebar" style={{width:220,background:'var(--surface)',borderRight:'1px solid var(--border)',padding:'24px 16px',display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh'}}>
        <div style={{marginBottom:28}}>
          <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:20,color:'var(--orange)',letterSpacing:'-0.02em'}}>ShipFlow</div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Shopee Food Tracker</div>
          <div style={{marginTop:8,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:11,color:'var(--blue)',fontWeight:600}}>👤 {username}</span>
            <span style={{fontSize:10,color:saving?'var(--yellow)':'var(--green)'}}>{saving ? '⏳ Đang lưu...' : '✅ Đã lưu'}</span>
          </div>
        </div>
        <nav style={{flex:1}}>
          {navPages.map(p=>(
            <button key={p.id} className={`nav-item ${page===p.id?'active':''}`} onClick={()=>setPage(p.id)}>
              <Icon name={p.icon} size={16}/> {p.label}
            </button>
          ))}
        </nav>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:16,display:'flex',flexDirection:'column',gap:8}}>
          <div className="section-title">Thao tác nhanh</div>
          <button className="btn btn-primary btn-sm" onClick={()=>setModal('order')} style={{width:'100%'}}><Icon name="plus" size={13}/> Nhập đơn</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('transfer')} style={{width:'100%'}}><Icon name="transfer" size={13}/> Chuyển tiền</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('tipapp')} style={{width:'100%'}}><Icon name="tip" size={13}/> Tip App</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('cash')} style={{width:'100%',color:'var(--green)',borderColor:'#00E5A033'}}>💰 Nạp / Rút tiền</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setModal('wallet')} style={{width:'100%'}}>⚙️ Số dư ban đầu</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowBackup(true)} style={{width:'100%'}}>💾 Backup / Restore</button>
          <button className="btn btn-ghost btn-sm" onClick={handleLogout} style={{width:'100%',color:'var(--red)',borderColor:'var(--red-dim)'}}>🚪 Đăng xuất</button>
        </div>
      </aside>

      {/* Mobile Top Bar */}
      <div className="mobile-topbar">
        <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:18,color:'var(--orange)'}}>ShipFlow</div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:11,color:saving?'var(--yellow)':'var(--green)'}}>{saving ? '⏳' : '✅'}</span>
          <span style={{fontSize:11,color:'var(--blue)',fontWeight:600}}>👤 {username}</span>
          <button className="btn btn-ghost btn-sm" onClick={handleLogout} style={{color:'var(--red)',borderColor:'transparent',padding:'6px 10px',fontSize:12}}>🚪</button>
        </div>
      </div>

      {/* Main content */}
      <main className="main-content" style={{flex:1,padding:'32px 36px',maxWidth:1100,margin:'0 auto',width:'100%'}}>
        {page==='dashboard' && <Dashboard data={data} />}
        {page==='chart' && <ChartPage data={data} />}
        {page==='history' && <HistoryPage data={data} onDeleteOrder={deleteOrder} onDeleteTransfer={deleteTransfer} onEditOrder={editOrder} onDeleteCash={deleteCash} />}
      </main>

      {/* Mobile Bottom Nav */}
      <div className="mobile-bottomnav">
        {navPages.map(p=>(
          <button key={p.id} onClick={()=>setPage(p.id)}
            style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,border:'none',background:'transparent',cursor:'pointer',padding:'6px 0',color:page===p.id?'var(--orange)':'var(--muted)',transition:'color 0.15s',fontFamily:'Nunito',fontWeight:600,fontSize:10}}>
            <span style={{fontSize:20}}>{p.emoji}</span>
            <span>{p.label}</span>
          </button>
        ))}
        {/* Plus FAB button */}
        <button onClick={()=>setShowMobileMenu(true)}
          style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,border:'none',background:'transparent',cursor:'pointer',padding:'6px 0',color:'var(--orange)',fontFamily:'Nunito',fontWeight:700,fontSize:10}}>
          <span style={{width:36,height:36,borderRadius:'50%',background:'var(--orange)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:-2,boxShadow:'0 2px 12px #FF6B2B55'}}>
            <Icon name="plus" size={18} style={{color:'white'}}/>
          </span>
          <span style={{color:'var(--orange)'}}>Thêm</span>
        </button>
      </div>

      {/* Mobile Actions Sheet */}
      {showMobileMenu && <MobileActionsSheet onClose={()=>setShowMobileMenu(false)} onAction={handleMobileAction} />}

      {/* Modals */}
      {modal==='order' && <OrderModal onClose={()=>{setModal(null);setEditingOrder(null);}} onSave={applyOrder} initialData={editingOrder} />}
      {modal==='transfer' && <TransferModal onClose={()=>setModal(null)} onSave={applyTransfer} />}
      {modal==='tipapp' && <TipAppModal onClose={()=>setModal(null)} onSave={applyTipApp} />}
      {modal==='cash' && <CashModal onClose={()=>setModal(null)} onSave={applyCash} />}
      {modal==='wallet' && <WalletSetupModal wallets={data.wallets} onSave={w=>{
        setData(p=>({...p,wallets:w}));
        api.saveWallets(userId, w).catch(console.error);
      }} onClose={()=>setModal(null)} />}
      {showBackup && <BackupModal data={data} onClose={()=>setShowBackup(false)} onRestore={async (newData)=>{
        setData(newData);
        setShowBackup(false);
        setSaving(true);
        try { await api.saveAll(userId, newData); } catch(e) { console.error(e); } finally { setSaving(false); }
      }} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
